t-family=\"DM Sans\">5<\u002Ftext><text x=\"115\" y=\"18\" fill=\"rgba(255,255,255,.3)\" font-size=\"6\" text-anchor=\"middle\" font-family=\"DM Sans\">6<\u002Ftext><text x=\"135\" y=\"65\" fill=\"rgba(255,255,255,.3)\" font-size=\"6\" text-anchor=\"middle\" font-family=\"DM Sans\">7<\u002Ftext><\u002Fsvg><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">19 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(17)\">← Back<\u002Fbutton><button class=\"btn pri\" onclick=\"go(19)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S19: PLAYBOOK STEPS -->\n<div class=\"slide\" id=\"s19\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Act 3<\u002Fspan> · Playbook<\u002Fspan><div class=\"pips\" id=\"pp19\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"split\"><div class=\"sp-l narrow\"><div class=\"sp-t\">Seven steps to launch<\u002Fdiv><\u002Fdiv><div class=\"sp-r\" style=\"gap:3px;justify-content:center\">\n    <div class=\"prose\" style=\"font-size:13px;margin-bottom:2px\">Each step builds on the previous. The order matters.<\u002Fdiv>\n    <div class=\"lw\">\n      <div class=\"lr\" onclick=\"tl(this)\"><div class=\"lr-t\"><div class=\"lr-l\">Identify<\u002Fdiv><div class=\"lr-x\">Identify the teams<\u002Fdiv><\u002Fdiv><div class=\"lr-d\">Map products to teams. Understand technologies, docs, communication, management, reviews, release calendar.<\u002Fdiv><\u002Fdiv>\n      <div class=\"lr\" onclick=\"tl(this)\"><div class=\"lr-t\"><div class=\"lr-l\">Define<\u002Fdiv><div class=\"lr-x\">Define the role<\u002Fdiv><\u002Fdiv><div class=\"lr-d\">Measure current security state. Set goals. Produce role descriptions: expectations, time allocation, decision boundaries.<\u002Fdiv><\u002Fdiv>\n      <div class=\"lr\" onclick=\"tl(this)\"><div class=\"lr-t\"><div class=\"lr-l\">Nominate<\u002Fdiv><div class=\"lr-x\">Nominate champions<\u002Fdiv><\u002Fdiv><div class=\"lr-d\">Get genuine buy-in. Secure management approval. Include the role in performance conversations.<\u002Fdiv><\u002Fdiv>\n      <div class=\"lr\" onclick=\"tl(this)\"><div class=\"lr-t\"><div class=\"lr-l\">Set up<\u002Fdiv><div class=\"lr-x\">Communication channels<\u002Fdiv><\u002Fdiv><div class=\"lr-d\">Dedicated channels for knowledge exchange. Cross-team channels so champions learn from each other. A dead channel is worse than none.<\u002Fdiv><\u002Fdiv>\n      <div class=\"lr\" onclick=\"tl(this)\"><div class=\"lr-t\"><div class=\"lr-l\">Build<\u002Fdiv><div class=\"lr-x\">Knowledge base<\u002Fdiv><\u002Fdiv><div class=\"lr-d\">Procedures, checklists (web/mobile, third-party, UI, privacy). Leverage OWASP SKF, ASVS, MASVS, CERT — proven resources.<\u002Fdiv><\u002Fdiv>\n      <div class=\"lr\" onclick=\"tl(this)\"><div class=\"lr-t\"><div class=\"lr-l\">Train<\u002Fdiv><div class=\"lr-x\">Bring everyone up to speed<\u002Fdiv><\u002Fdiv><div class=\"lr-d\">Structured learning for all champions. Consistent baseline across teams. Security is a skill — it improves with deliberate, ongoing training.<\u002Fdiv><\u002Fdiv>\n      <div class=\"lr\" onclick=\"tl(this)\"><div class=\"lr-t\"><div class=\"lr-l\">Maintain<\u002Fdiv><div class=\"lr-x\">Maintain interest<\u002Fdiv><\u002Fdiv><div class=\"lr-d\">Workshops, quizzes, Hacker Fridays, newsletters, conferences, AppSec Ezine, Awesome AppSec. Sustained engagement, not a one-time event.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">20 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(18)\">← Back<\u002Fbutton><button class=\"btn pri\" onclick=\"go(20)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S20: RESPONSIBILITIES -->\n<div class=\"slide\" id=\"s20\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Act 3<\u002Fspan> · Playbook<\u002Fspan><div class=\"pips\" id=\"pp20\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"split\"><div class=\"sp-l narrow\"><div class=\"sp-t\">Day-to-day responsibilities<\u002Fdiv><\u002Fdiv><div class=\"sp-r\">\n    <div class=\"prose\">The Champion's work spans four <span class=\"gloss\" data-def=\"Software Assurance Maturity Model — OWASP's framework for measuring and improving security practices across Governance, Design, Implementation, Verification and Operations.\">OWASP SAMM<\u002Fspan> domains. In <strong>Governance<\u002Fstrong>: strategy, metrics, education. In <strong>Construction<\u002Fstrong>: security requirements, architecture, threat modeling. In <strong>Verification<\u002Fstrong>: testing, code review, audits. In <strong>Operations<\u002Fstrong>: hardening, incident response, backlog.<\u002Fdiv>\n    <div class=\"prose\">In practice: prioritizing security stories, creating Jira tickets for vulnerabilities, writing security tests (including contract-based testing), communicating with QA on security contracts, defining relevant security standards, and launching R&amp;D security initiatives when patterns repeat.<\u002Fdiv>\n    <div class=\"xp\" id=\"x16a\"><button class=\"xh\" onclick=\"tg('x16a')\"><span>What \"helicopter view\" means in practice<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x16a-p\">Most developers focus on their component — as they should. The Champion periodically steps back: stale dependencies? Access controls on the new endpoint? Security test coverage keeping pace? Not a full audit — a regular, lightweight scan that catches drift before it becomes debt.<\u002Fdiv><\u002Fdiv>\n    <div class=\"xp\" id=\"x16b\"><button class=\"xh\" onclick=\"tg('x16b')\"><span>How this fits into your sprint<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x16b-p\">Don't make security a separate track. Integrate it: a security story each sprint, a quick check during code review, a standing item in retros. When security is part of the regular workflow, compliance follows naturally.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">21 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(19)\">← Back<\u002Fbutton><button class=\"btn pri\" onclick=\"go(21)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S21: THREAT MODELING -->\n<div class=\"slide\" id=\"s21\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Act 3<\u002Fspan> · Playbook<\u002Fspan><div class=\"pips\" id=\"pp21\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"split\"><div class=\"sp-l\"><div class=\"sp-t\">Threat modeling<\u002Fdiv><\u002Fdiv><div class=\"sp-r\">\n    <div class=\"prose\">Many teams think threat modeling requires specialized tools and weeks of analysis. In practice, a useful threat model can be produced in a single working session.<\u002Fdiv>\n    <div class=\"co\" style=\"font-weight:600\"><span class=\"gloss\" data-def=\"Data Flow Diagram — a visual map of how data moves through your system, showing components, data stores, and trust boundaries.\">DFD<\u002Fspan> + <span class=\"gloss\" data-def=\"Spoofing, Tampering, Repudiation, Information disclosure, Denial of service, Elevation of privilege — Microsoft's six threat categories.\">STRIDE<\u002Fspan> = Threat Model → Risks → Backlog<\u002Fdiv>\n    <div class=\"prose\">An underappreciated benefit: threat models serve as superior project briefs. They force the team to articulate data flows, trust boundaries, and assumptions — surfacing design flaws before production.<\u002Fdiv>\n    <div class=\"xp\" id=\"x17a\"><button class=\"xh\" onclick=\"tg('x17a')\"><span>STRIDE — what each letter means<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x17a-p\"><strong>S<\u002Fstrong>poofing · <strong>T<\u002Fstrong>ampering · <strong>R<\u002Fstrong>epudiation · <strong>I<\u002Fstrong>nfo disclosure · <strong>D<\u002Fstrong>enial of service · <strong>E<\u002Fstrong>levation of privilege. Applied to each DFD element, these produce a comprehensive threat inventory.<\u002Fdiv><\u002Fdiv>\n    <div class=\"xp\" id=\"x17b\"><button class=\"xh\" onclick=\"tg('x17b')\"><span>PASTA — an alternative methodology<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x17b-p\">PASTA (Process for Attack Simulation and Threat Analysis) is a seven-stage, risk-centric methodology. Where STRIDE focuses on threat categories per component, PASTA starts from business objectives and works down through technical architecture to attack simulation. Both are valid — STRIDE is faster for individual components, PASTA is more thorough for system-level analysis. Choose based on scope.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">22 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(20)\">← Back<\u002Fbutton><button class=\"btn pri\" onclick=\"go(22)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S22: KRIs -->\n<div class=\"slide\" id=\"s22\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Act 3<\u002Fspan> · Playbook<\u002Fspan><div class=\"pips\" id=\"pp22\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"split\"><div class=\"sp-l\"><div class=\"sp-t\">How to know if the program is working<\u002Fdiv><\u002Fdiv><div class=\"sp-r\">\n    <div class=\"prose\">Security Champions work with <span class=\"gloss\" data-def=\"Key Risk Indicator — a measurable signal that tracks how your security posture is changing over time. Unlike a metric, a KRI is read as a trend, not a number.\">Key Risk Indicators (KRIs)<\u002Fspan>. A good KRI is not a raw count — it is a trend that tells a story.<\u002Fdiv>\n    <div class=\"prose\">Example: 5 critical vulnerabilities in Q1, 7 in Q2, 8 in Q3, 12 in Q4. This is not a data point — it is a narrative of degrading posture. A stable 5 per cycle may mean the team is not actively looking for issues.<\u002Fdiv>\n    <div class=\"prose\">KRIs tell you when something is going wrong. The next question is how to keep things going right.<\u002Fdiv>\n    <div class=\"xp\" id=\"x18a\"><button class=\"xh\" onclick=\"tg('x18a')\"><span>Which KRIs to track<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x18a-p\">Critical vulnerabilities per release (trend), security incidents, business disruption events, release delays from security issues, and mean time to remediate (MTTR). Together, these show whether the program is improving posture or just consuming resources.<\u002Fdiv><\u002Fdiv>\n    <div class=\"xp\" id=\"x18b\"><button class=\"xh\" onclick=\"tg('x18b')\"><span>KRIs as a metric for the program itself<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x18b-p\">If KRIs don't improve within 2–3 quarters, something is wrong — insufficient time, impractical training, or weak organizational support. KRIs give you the signal to investigate before the program quietly dies.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">23 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(21)\">← Back<\u002Fbutton><button class=\"btn reflect-btn\" onclick=\"openReflect('signals')\">⏸ Reflect<\u002Fbutton><button class=\"btn pri\" onclick=\"go(23)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S23: KEEPING ALIVE -->\n<div class=\"slide\" id=\"s23\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Act 3<\u002Fspan> · Playbook<\u002Fspan><div class=\"pips\" id=\"pp23\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"split\"><div class=\"sp-l\"><div class=\"sp-t\">Keeping the program alive<\u002Fdiv><\u002Fdiv><div class=\"sp-r\">\n    <div class=\"prose\">A program that launches with enthusiasm and fades after three months is worse than no program — it creates the illusion of coverage without reality.<\u002Fdiv>\n    <div class=\"prose\"><strong>Continuous learning is the backbone<\u002Fstrong> — not status updates, but a steady drip of <em>knowledge-sharing<\u002Fem>. Stay current on AppSec news, bug bounty findings, vulnerabilities your team finds and fixes, and secure coding techniques relevant to your stack.<\u002Fdiv>\n    <div class=\"prose\">A few practical channels: a <strong>shared security feed<\u002Fstrong> (Slack/Teams) for incidents and reading, a rotating <strong>\"finding of the week\"<\u002Fstrong> writeup, occasional <strong>brown-bag sessions<\u002Fstrong> when something is worth a real conversation. The format matters less than the rhythm. If engagement drops, the content is not compelling enough.<\u002Fdiv>\n    <div class=\"xp\" id=\"x19a\"><button class=\"xh\" onclick=\"tg('x19a')\"><span>Sustaining long-term interest<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x19a-p\">Workshops keep skills sharp. \"Hacker Fridays\" with OWASP WebGoat or DVWA build practical experience. Newsletters, conference calendars, curated reading lists (AppSec Ezine, Awesome AppSec). The principle: variety — no single format sustains interest indefinitely.<\u002Fdiv><\u002Fdiv>\n    <div class=\"xp\" id=\"x19b\"><button class=\"xh\" onclick=\"tg('x19b')\"><span>The slow death of a security program<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x19b-p\">It happens the same way every time: meetings become optional, then monthly, then quarterly, then \"we should really restart that.\" Champions deprioritize under sprint pressure. KRIs stop being tracked. By the time a real incident happens, the program exists only on paper. Preventing this requires sustained variety and visible management support — not just initial enthusiasm.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">24 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(22)\">← Back<\u002Fbutton><button class=\"btn pri\" onclick=\"go(24)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S24: SECTION — PRINCIPLES -->\n<div class=\"slide\" id=\"s24\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Part 4<\u002Fspan><\u002Fspan><div class=\"pips\" id=\"pp24\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"fbody\">\n    <div class=\"fb-content\">\n      <div class=\"fb-tg\">Part 4<\u002Fdiv>\n      <div class=\"fb-tt\">The principles that make it work<\u002Fdiv>\n      <div class=\"fb-sb\">Tools and processes have limits. These principles do not.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"fb-visual\"><svg viewBox=\"0 0 100 100\" width=\"220\" height=\"220\"><g class=\"gear-outer\" transform=\"translate(50,50)\"><path d=\"M0,-38 L6,-36 L8,-30 L14,-28 L18,-34 L24,-30 L22,-24 L28,-18 L34,-22 L36,-16 L30,-12 L30,-6 L38,0 L36,6 L30,8 L28,14 L34,18 L30,24 L24,22 L18,28 L22,34 L16,36 L12,30 L6,30 L0,38 L-6,36 L-8,30 L-14,28 L-18,34 L-24,30 L-22,24 L-28,18 L-34,22 L-36,16 L-30,12 L-30,6 L-38,0 L-36,-6 L-30,-8 L-28,-14 L-34,-18 L-30,-24 L-24,-22 L-18,-28 L-22,-34 L-16,-36 L-12,-30 L-6,-30 Z\" fill=\"none\" stroke=\"rgba(232,129,58,.25)\" stroke-width=\"1\"><\u002Fpath><\u002Fg><circle cx=\"50\" cy=\"50\" r=\"18\" fill=\"none\" stroke=\"rgba(232,129,58,.15)\" stroke-width=\"1\"><\u002Fcircle><g class=\"heart-core\" transform=\"translate(50,48)\"><path d=\"M0,4 C0,4 -8,-4 -8,-8 C-8,-12 -4,-14 0,-10 C4,-14 8,-12 8,-8 C8,-4 0,4 0,4 Z\" fill=\"var(--or)\" opacity=\".7\"><\u002Fpath><\u002Fg><\u002Fsvg><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">25 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(23)\">← Back<\u002Fbutton><button class=\"btn pri\" onclick=\"go(25)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S25: HISTORICAL CONTEXT -->\n<div class=\"slide\" id=\"s25\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Act 4<\u002Fspan> · Principles<\u002Fspan><div class=\"pips\" id=\"pp25\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"split\"><div class=\"sp-l\"><div class=\"sp-t\">How we got here<\u002Fdiv><\u002Fdiv><div class=\"sp-r\">\n    <div class=\"prose\">Before 2007, \"information security\" was largely paper-based — access control lists, physical procedures. Between 2011–2012, \"cybersecurity\" went mainstream. By 2015–2016, APT attacks shifted from consumer to business targets.<\u002Fdiv>\n    <div class=\"prose\">The turning point: the 2016–2017 ransomware boom. Cryptocurrency made untraceable payments possible, creating an attacker business model that scaled globally. The cybersecurity market doubled. Since 2017, security is no longer optional for any digital business.<\u002Fdiv>\n    <div class=\"prose\">This is the context for the principles that follow — lessons extracted from this evolution.<\u002Fdiv>\n    <div class=\"xp\" id=\"x21a\"><button class=\"xh\" onclick=\"tg('x21a')\"><span>Why cryptocurrency changed everything<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x21a-p\">Before crypto, ransomware was limited by the difficulty of payment without being traced. Bitcoin solved the attacker's problem: anonymous, fast, cross-border. This turned ransomware into an industrial-scale operation and forced every organization to take cybersecurity seriously.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">26 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(24)\">← Back<\u002Fbutton><button class=\"btn pri\" onclick=\"go(26)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S26: GOLDEN RULE -->\n<div class=\"slide\" id=\"s26\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Act 4<\u002Fspan> · Principles<\u002Fspan><div class=\"pips\" id=\"pp26\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"split\"><div class=\"sp-l\"><div class=\"sp-t\">The golden rule<\u002Fdiv><\u002Fdiv><div class=\"sp-r\">\n    <div class=\"prose\">The single most important principle: <strong>do not implement security at the cost of disrupting the development process.<\u002Fstrong><\u002Fdiv>\n    <div class=\"prose\">When security becomes a blocker — delaying releases, creating bottlenecks — the business will override it. Every time. This is a rational economic decision, not a failure of culture.<\u002Fdiv>\n    <div class=\"prose\">Security should be invisible infrastructure — helping the team move faster, not a gate that slows them down.<\u002Fdiv>\n    <div class=\"xp\" id=\"x22a\"><button class=\"xh\" onclick=\"tg('x22a')\"><span class=\"xi\">💬<\u002Fspan><span>From a security specialist — on what happens when security disrupts<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x22a-p\"><div class=\"xb-q\">\"I've seen situations where security disrupted the business process. Who won? The business. Every time.\"<\u002Fdiv><div class=\"xb-n\">This is not cynicism. Security that creates friction will be deprioritized under pressure — and \"under pressure\" is the normal state of a product team. The only sustainable security fits inside the existing workflow.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"xp\" id=\"x22b\"><button class=\"xh\" onclick=\"tg('x22b')\"><span>What \"invisible infrastructure\" looks like<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x22b-p\">Automated scanning in CI. Security linting in the IDE before commit. Threat modeling during sprint planning. Pre-approved security patterns developers use without requesting review. Each adds value without friction.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">27 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(25)\">← Back<\u002Fbutton><button class=\"btn pri\" onclick=\"go(27)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S27: CULTURE -->\n<div class=\"slide\" id=\"s27\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Act 4<\u002Fspan> · Principles<\u002Fspan><div class=\"pips\" id=\"pp27\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"split\"><div class=\"sp-l\"><div class=\"sp-t\">Culture over strategy<\u002Fdiv><\u002Fdiv><div class=\"sp-r\">\n    <div class=\"co\" style=\"border-left-color:var(--gr);font-weight:600\">\"Culture eats strategy for breakfast.\" — Peter Drucker<\u002Fdiv>\n    <div class=\"prose\">The goal is not just to secure a product. It is to create a security culture — a shared mindset where developers naturally consider security, not because they are required to, but because it is how they think about quality.<\u002Fdiv>\n    <div class=\"prose\">Enforcement produces compliance — rules followed when watched. Culture produces internalized behavior. The results of culture are significantly better and longer-lasting.<\u002Fdiv>\n    <div class=\"xp\" id=\"x23a\"><button class=\"xh\" onclick=\"tg('x23a')\"><span>Culture vs. enforcement — a practical scenario<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x23a-p\">Friday release. Security scan flagged two medium findings. <strong>Enforcement:<\u002Fstrong> blocked, delay, frustration. <strong>Culture:<\u002Fstrong> team discusses findings, assesses real risk, documents a plan for next sprint, releases on time with informed acceptance. The second approach is not less secure — it is more mature.<\u002Fdiv><\u002Fdiv>\n    <div class=\"xp\" id=\"x23b\"><button class=\"xh\" onclick=\"tg('x23b')\"><span>How culture actually develops<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x23b-p\">Not through training alone. It develops through repeated exposure to security thinking in everyday contexts. When a developer independently flags a suspicious dependency update because they remembered last month's security meeting — that is culture working. Slow, incremental, compounding.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">28 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(26)\">← Back<\u002Fbutton><button class=\"btn pri\" onclick=\"go(28)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S28: COMMON OBJECTIONS -->\n<div class=\"slide\" id=\"s28\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Act 4<\u002Fspan> · Principles<\u002Fspan><div class=\"pips\" id=\"pp28\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"split\"><div class=\"sp-l narrow\"><div class=\"sp-t\">Common objections<\u002Fdiv><\u002Fdiv><div class=\"sp-r\">\n    <div class=\"prose\"><strong>\"Isn't this diluting security responsibility?\"<\u002Fstrong> No. Developers should develop. The Champion reduces latency — available quickly at blockers, gradually building baseline awareness. The security team retains strategy and deep expertise.<\u002Fdiv>\n    <div class=\"prose\"><strong>\"What if the Champion leaves?\"<\u002Fstrong> A people management concern, not a design flaw. Every critical role carries this risk. Knowledge sharing, rotation, and 2+ champions reduce impact. If one departure creates a crisis, the program had a structural weakness.<\u002Fdiv>\n    <div class=\"prose\"><strong>\"We don't have time.\"<\u002Fstrong> If you don't have time for proactive security, you will make time for reactive incident response. Damage control costs 10–50x more than prevention.<\u002Fdiv>\n    <div class=\"xp\" id=\"x24a\"><button class=\"xh\" onclick=\"tg('x24a')\"><span>\"Our product isn't a target\" — why this is always wrong<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x24a-p\">Every product that processes data or connects to the internet is a target. Attackers don't pick the most valuable target — they pick the easiest entry point. A forgotten staging server, an unpatched dependency, a default credential — these are what get exploited first. \"We're too small to be a target\" is the most common last sentence before a breach report.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">29 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(27)\">← Back<\u002Fbutton><button class=\"btn pri\" onclick=\"go(29)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S29: FINAL QUIZ -->\n<div class=\"slide\" id=\"s29\">\n  <div class=\"sh\"><span class=\"stag\">Final knowledge check<\u002Fspan><div class=\"pips\" id=\"pp29\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"split\"><div class=\"sp-l narrow\"><div class=\"sp-t\">Final knowledge check<\u002Fdiv><\u002Fdiv><div class=\"sp-r\">\n    <div class=\"qw\" id=\"q4\"><div class=\"qq\">The golden rule of implementing security?<\u002Fdiv><button class=\"qo\" onclick=\"pk('q4',0)\">A) Security top priority, even if delays releases<\u002Fbutton><button class=\"qo\" onclick=\"pk('q4',1)\">B) Implement without disrupting the dev process<\u002Fbutton><button class=\"qo\" onclick=\"pk('q4',2)\">C) Every line must pass security review<\u002Fbutton><button class=\"qo\" onclick=\"pk('q4',3)\">D) CISO's responsibility<\u002Fbutton><div class=\"qe\" id=\"q4-e\"><strong>B.<\u002Fstrong> When security blocks, business overrides. Non-disruptive approaches are the mandate.<\u002Fdiv><\u002Fdiv>\n    <div class=\"qw\" id=\"q5\"><div class=\"qq\">Why is culture more effective than enforcement?<\u002Fdiv><button class=\"qo\" onclick=\"pk('q5',0)\">A) Cheaper<\u002Fbutton><button class=\"qo\" onclick=\"pk('q5',1)\">B) Impractical in agile<\u002Fbutton><button class=\"qo\" onclick=\"pk('q5',2)\">C) Personal responsibility produces better, longer-lasting results<\u002Fbutton><button class=\"qo\" onclick=\"pk('q5',3)\">D) Eliminates need for tools<\u002Fbutton><div class=\"qe\" id=\"q5-e\"><strong>C.<\u002Fstrong> Enforcement = compliance under supervision. Culture = internalized behavior. Culture is the multiplier.<\u002Fdiv><\u002Fdiv>\n    <div class=\"qw\" id=\"q6\"><div class=\"qq\">Formula for a structured threat model?<\u002Fdiv><button class=\"qo\" onclick=\"pk('q6',0)\">A) Risk Register + CVSS<\u002Fbutton><button class=\"qo\" onclick=\"pk('q6',1)\">B) Pen test + vuln scan<\u002Fbutton><button class=\"qo\" onclick=\"pk('q6',2)\">C) DFD + STRIDE<\u002Fbutton><button class=\"qo\" onclick=\"pk('q6',3)\">D) OWASP Top 10 + code review<\u002Fbutton><div class=\"qe\" id=\"q6-e\"><strong>C.<\u002Fstrong> DFD maps data flows. STRIDE identifies threats. Together → trackable risks.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">30 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(28)\">← Back<\u002Fbutton><button class=\"btn pri\" onclick=\"go(30)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S30: ACTIONS -->\n<div class=\"slide\" id=\"s30\">\n  <div class=\"sh\"><span class=\"stag\">Next steps<\u002Fspan><div class=\"pips\" id=\"pp30\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"split\"><div class=\"sp-l\"><div class=\"sp-t\">What to do next<\u002Fdiv><\u002Fdiv><div class=\"sp-r\">\n    <div class=\"prose\">Before you close this module, consider three concrete actions.<\u002Fdiv>\n    <div class=\"xp\" id=\"x26a\"><button class=\"xh\" onclick=\"tg('x26a')\"><span>📅 This week<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x26a-p\">Identify who the Security Champion is — or should be — on your team. If the role doesn't exist, start the conversation. Review your most recent security-related tickets to understand the baseline.<\u002Fdiv><\u002Fdiv>\n    <div class=\"xp\" id=\"x26b\"><button class=\"xh\" onclick=\"tg('x26b')\"><span>📆 This month<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x26b-p\">Set up a security channel. Draft a simple threat model for one service — even a rough DFD on a whiteboard with STRIDE applied informally. Identify 2–3 KRIs you can start tracking.<\u002Fdiv><\u002Fdiv>\n    <div class=\"xp\" id=\"x26c\"><button class=\"xh\" onclick=\"tg('x26c')\"><span>🗣️ At your next standup or code review<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x26c-p\">Raise one security observation: \"This API handles sensitive data — do we have input validation?\" or \"This dependency update is a major version bump — has anyone checked the changelog?\" Normalize security as part of daily conversation.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">31 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(29)\">← Back<\u002Fbutton><button class=\"btn pri\" onclick=\"go(31)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S31: CLOSING — Champion Manifesto -->\n<div class=\"slide\" id=\"s31\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Complete<\u002Fspan> · Your Manifesto<\u002Fspan><div class=\"pips\" id=\"pp31\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"manifesto-wrap\">\n    <div class=\"mf-intro\">\n      <div class=\"mf-tg\">End of module<\u002Fdiv>\n      <div class=\"mf-tt\">Your Champion Manifesto<\u002Fdiv>\n      <div class=\"mf-sb\">Security Champions are not certified — they are recognized by impact. This is your record from today. Save it, share it, sign it.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mf-name-row\">\n      <label for=\"mf-name-input\">Your name<\u002Flabel>\n      <input id=\"mf-name-input\" type=\"text\" placeholder=\"e.g. Alex Rivera\" maxlength=\"40\" autocomplete=\"name\">\n    <\u002Fdiv>\n    <div class=\"mf-card\" id=\"mf-card\">\n      <div class=\"mf-card-tag\">Security Champions Program · 2026<\u002Fdiv>\n      <div class=\"mf-card-name empty\" id=\"mf-card-name\">Your name appears here<\u002Fdiv>\n      <div class=\"mf-card-rank\">Rank: <b id=\"mf-card-rank\">Recruit<\u002Fb> · <span id=\"mf-card-tier\"><\u002Fspan><\u002Fdiv>\n      <div class=\"mf-stats\">\n        <div class=\"mf-stat accent\"><div class=\"ms-n\" id=\"mf-stat-xp\">0<\u002Fdiv><div class=\"ms-l\">XP earned<\u002Fdiv><\u002Fdiv>\n        <div class=\"mf-stat\"><div class=\"ms-n\" id=\"mf-stat-correct\">0/6<\u002Fdiv><div class=\"ms-l\">Quizzes<\u002Fdiv><\u002Fdiv>\n        <div class=\"mf-stat\"><div class=\"ms-n\" id=\"mf-stat-streak\">0<\u002Fdiv><div class=\"ms-l\">Best streak<\u002Fdiv><\u002Fdiv>\n        <div class=\"mf-stat\"><div class=\"ms-n\" id=\"mf-stat-reflect\">0<\u002Fdiv><div class=\"ms-l\">Reflections<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mf-section\">\n        <div class=\"mf-section-h\">Badges earned<\u002Fdiv>\n        <div class=\"mf-badges\" id=\"mf-badges\"><span class=\"mf-empty\">Earn badges by answering quizzes confidently and reflecting along the way.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mf-section\">\n        <div class=\"mf-section-h\">Commitment<\u002Fdiv>\n        <div class=\"mf-commit\">I, <b id=\"mf-commit-name\">_______<\u002Fb>, will bring one idea from this module into my next standup, design review, or 1:1 — and start <b>one<\u002Fb> security conversation that wouldn't have happened otherwise.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mf-actions\">\n      <button class=\"btn\" onclick=\"go(30)\">← Back<\u002Fbutton>\n      <button class=\"btn\" onclick=\"downloadManifesto()\">⬇ Download PNG<\u002Fbutton>\n      <button class=\"btn\" onclick=\"copyManifestoText()\">📋 Copy text<\u002Fbutton>\n      <button class=\"btn\" onclick=\"resetCourse()\">↺ Retake<\u002Fbutton>\n      <button class=\"btn pri\" onclick=\"finishCourse()\">Finish ✓<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Toast for manifesto actions -->\n<div id=\"mf-toast\" class=\"mf-toast\"><\u002Fdiv>\n\n<\u002Fdiv><!-- end .deck -->\n\n<!-- Reflection modal (single, reused for all reflect buttons) -->\n<div id=\"reflect-modal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"rm-q\">\n  <div class=\"rm-card\">\n    <button class=\"rm-close\" aria-label=\"Close\" onclick=\"closeReflect()\">×<\u002Fbutton>\n    <div class=\"rm-tag\">⏸  Pause to reflect<\u002Fdiv>\n    <div class=\"rm-q\" id=\"rm-q\"><\u002Fdiv>\n    <div class=\"rm-sub\" id=\"rm-sub\"><\u002Fdiv>\n    <div class=\"rm-actions\"><button class=\"btn pri\" onclick=\"closeReflect()\">Got it →<\u002Fbutton><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\nconst T=32;let c=0;\n\n/* ═══════════════════════════════════════════════════\n   GAMIFICATION: score, streak, wagers, badges, persistence\n   ═══════════════════════════════════════════════════ */\nconst STORAGE_KEY='sc_course_v4_state';\nconst RANKS=[\n  {min:0,name:'RECRUIT',label:'Just getting started'},\n  {min:8,name:'APPRENTICE',label:'You\\'re building the instinct'},\n  {min:20,name:'CHAMPION',label:'You\\'ve got the mindset'},\n  {min:36,name:'CAPTAIN',label:'Lead the way for your team'},\n  {min:50,name:'LEGEND',label:'Top of your class'}\n];\nconst DEFAULT_STATE={\n  xp:0,\n  streak:0,\n  bestStreak:0,\n  answers:{},        // qId -> {picked, correct, wager, points}\n  wagers:{},         // qId -> wager multiplier (set before pk)\n  reflections:[],    // keys of reflect prompts opened\n  name:'',\n  startedAt:Date.now()\n};\nlet state={...DEFAULT_STATE,answers:{},wagers:{},reflections:[]};\n\nfunction loadState(){\n  try{\n    const raw=localStorage.getItem(STORAGE_KEY);\n    if(raw){const s=JSON.parse(raw);state={...DEFAULT_STATE,...s,answers:s.answers||{},wagers:s.wagers||{},reflections:s.reflections||[]}}\n  }catch(e){}\n}\nfunction saveState(){\n  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){}\n}\nfunction rankFor(xp){let r=RANKS[0];for(const x of RANKS){if(xp>=x.min)r=x}return r}\n\nfunction renderChips(){\n  const r=rankFor(state.xp);\n  document.querySelectorAll('.scorechip').forEach(chip=>{\n    chip.querySelector('.sc-rank').textContent=r.name[0];\n    chip.querySelector('.sc-rank').title=r.name;\n    chip.querySelector('.sc-xp').innerHTML=`<b>${state.xp}<\u002Fb> XP`;\n    const sk=chip.querySelector('.sc-streak');\n    if(state.streak>=2){sk.classList.add('live');sk.innerHTML=`<span class=\"sc-flame\">🔥<\u002Fspan> ${state.streak}`}\n    else{sk.classList.remove('live');sk.innerHTML=`<span style=\"opacity:.5\">·<\u002Fspan> ${r.name}`}\n  });\n}\nfunction bumpChips(){document.querySelectorAll('.scorechip').forEach(c=>{c.classList.remove('bump');void c.offsetWidth;c.classList.add('bump')})}\n\nfunction go(n){if(n<0||n>=T)return;document.getElementById('s'+c).classList.remove('on');c=n;document.getElementById('s'+n).classList.add('on');const r=document.getElementById('s'+n).querySelector('.sp-r');if(r)r.scrollTop=0;document.querySelectorAll('.pips').forEach(p=>bp(p));window.scrollTo(0,0);if(n===31)renderManifesto()}\nfunction bp(el){if(!el)return;el.innerHTML='';for(let i=0;i<T;i++){const b=document.createElement('button');b.className='pip'+(i===c?' on':'');b.onclick=()=>go(i);el.appendChild(b)}}\ndocument.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();go(c+1)}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();go(c-1)}});\nfunction tg(id){const el=document.getElementById(id),b=el.querySelector('.xb'),a=el.querySelector('.xa');b.classList.toggle('op');if(a)a.classList.toggle('op')}\nconst ans={q1:3,q2:1,q3:1,q4:1,q5:2,q6:2};\n\n/* ═══ INJECT WAGER UI INTO EVERY QUIZ ═══ */\nconst WAGERS=[\n  {key:'sure',mult:3,name:'Sure',sub:'×3 if right · 0 if wrong'},\n  {key:'pretty',mult:2,name:'Pretty sure',sub:'×2 if right · 1 if wrong'},\n  {key:'guess',mult:1,name:'Just guessing',sub:'×1 either way'}\n];\nfunction buildWagerUI(qw){\n  const qq=qw.querySelector('.qq');if(!qq)return;\n  const qid=qw.id;\n  const w=document.createElement('div');\n  w.className='wager';w.dataset.qid=qid;\n  w.innerHTML=`<div class=\"wager-lab\">How confident are you?<\u002Fdiv>\n    <div class=\"wager-row\">${WAGERS.map(g=>`<button class=\"wager-btn\" data-w=\"${g.key}\" data-m=\"${g.mult}\"><div class=\"wb-top\"><span class=\"wb-mult\">×${g.mult}<\u002Fspan><span class=\"wb-name\">${g.name}<\u002Fspan><\u002Fdiv><div class=\"wb-sub\">${g.sub}<\u002Fdiv><\u002Fbutton>`).join('')}<\u002Fdiv>`;\n  qq.parentNode.insertBefore(w,qq.nextSibling);\n  w.querySelectorAll('.wager-btn').forEach(btn=>{\n    btn.onclick=()=>{\n      if(w.classList.contains('locked'))return;\n      w.querySelectorAll('.wager-btn').forEach(b=>b.classList.remove('pk'));\n      btn.classList.add('pk');\n      state.wagers[qid]=parseInt(btn.dataset.m,10);\n      saveState();\n    };\n  });\n  /* if previously selected, restore */\n  if(state.wagers[qid]){\n    const b=w.querySelector(`.wager-btn[data-m=\"${state.wagers[qid]}\"]`);\n    if(b)b.classList.add('pk');\n  }\n}\nfunction lockWager(qid){\n  const w=document.querySelector(`.wager[data-qid=\"${qid}\"]`);\n  if(!w)return;\n  w.classList.add('locked');\n  w.querySelectorAll('.wager-btn').forEach(b=>b.disabled=true);\n  const mult=state.wagers[qid]||1;\n  const wname=WAGERS.find(g=>g.mult===mult)?.name||'Just guessing';\n  w.innerHTML=`<div class=\"wager-locked-note\">🎯 You wagered <b>${wname}<\u002Fb> (×${mult})<\u002Fdiv>`;\n}\n\nfunction pk(q,i){\n  const w=document.getElementById(q),o=w.querySelectorAll('.qo');\n  if(o[0].classList.contains('pk'))return;\n  /* require a wager — if none, default to \"guessing\" silently */\n  if(!state.wagers[q])state.wagers[q]=1;\n  const mult=state.wagers[q];\n  const k=ans[q];\n  const correct=(i===k);\n  o.forEach((x,j)=>{x.classList.add('pk');if(j===k)x.classList.add('ok');else if(j===i&&j!==k)x.classList.add('no')});\n  /* score */\n  let pts=0,kind='zero',msg='';\n  if(correct){\n    pts=mult*3;\n    state.streak++;if(state.streak>state.bestStreak)state.bestStreak=state.streak;\n    kind='';\n    if(mult===3)msg=`Confident and correct. <b>+${pts} XP<\u002Fb>${state.streak>=2?` · 🔥 ${state.streak} streak`:''}`;\n    else if(mult===2)msg=`Right call. <b>+${pts} XP<\u002Fb>`;\n    else msg=`Lucky guess — still counts. <b>+${pts} XP<\u002Fb>`;\n  }else{\n    if(mult===3){pts=0;kind='zero';msg=`Confidence didn't pay off here. <b>+0 XP<\u002Fb> · streak reset.`}\n    else if(mult===2){pts=1;kind='humility';msg=`Humility bonus — knowing you might be wrong is half the skill. <b>+1 XP<\u002Fb>`}\n    else {pts=1;kind='humility';msg=`Honest guess — keep going. <b>+1 XP<\u002Fb>`}\n    state.streak=0;\n  }\n  state.xp+=pts;\n  state.answers[q]={picked:i,correct,wager:mult,points:pts};\n  saveState();renderChips();bumpChips();lockWager(q);\n  /* augment explanation with score readout */\n  const e=document.getElementById(q+'-e');\n  e.classList.add('sh');\n  if(!e.querySelector('.qe-score')){\n    const s=document.createElement('div');s.className='qe-score';\n    s.innerHTML=`<span class=\"qs-pts ${kind}\">${pts>0?'+':''}${pts} XP<\u002Fspan><span class=\"qs-msg\">${msg}<\u002Fspan>`;\n    e.appendChild(s);\n  }\n}\nfunction tl(el){const w=el.classList.contains('ex');document.querySelectorAll('.lr').forEach(r=>r.classList.remove('ex'));if(!w)el.classList.add('ex')}\n\n/* ═══ INSERT SCORE CHIP INTO EVERY HEADER ═══ */\nfunction injectChips(){\n  document.querySelectorAll('.sh').forEach(sh=>{\n    const stag=sh.querySelector('.stag');\n    const pips=sh.querySelector('.pips');\n    if(!stag||!pips)return;\n    /* wrap right side */\n    const right=document.createElement('div');right.className='sh-right';\n    pips.parentNode.insertBefore(right,pips);right.appendChild(pips);\n    const chip=document.createElement('div');chip.className='scorechip';chip.title='Your XP and streak';\n    chip.innerHTML=`<span class=\"sc-rank\">R<\u002Fspan><span class=\"sc-xp\"><b>0<\u002Fb> XP<\u002Fspan><span class=\"sc-streak\"><span style=\"opacity:.5\">·<\u002Fspan> RECRUIT<\u002Fspan>`;\n    right.insertBefore(chip,pips);\n  });\n}\n\n/* ═══ INIT ═══ */\nloadState();\ninjectChips();\ndocument.querySelectorAll('.qw').forEach(buildWagerUI);\n/* if answers already given, lock UIs */\nObject.keys(state.answers).forEach(q=>{\n  const a=state.answers[q];\n  const qw=document.getElementById(q);if(!qw)return;\n  const o=qw.querySelectorAll('.qo'),k=ans[q];\n  o.forEach((x,j)=>{x.classList.add('pk');if(j===k)x.classList.add('ok');else if(j===a.picked&&j!==k)x.classList.add('no')});\n  const e=document.getElementById(q+'-e');if(e){e.classList.add('sh');if(!e.querySelector('.qe-score')){const s=document.createElement('div');s.className='qe-score';s.innerHTML=`<span class=\"qs-pts ${a.points===0?'zero':(a.correct?'':'humility')}\">+${a.points} XP<\u002Fspan><span class=\"qs-msg\">Already answered. ${a.correct?'Correct.':'Try the retake to improve.'}<\u002Fspan>`;e.appendChild(s)}}\n  lockWager(q);\n});\nrenderChips();\ndocument.querySelectorAll('.pips').forEach(p=>bp(p));\n\n/* ═══ MANIFESTO ═══ */\nfunction renderManifesto(){\n  const r=rankFor(state.xp);\n  const correct=Object.values(state.answers).filter(a=>a.correct).length;\n  const total=6;\n  /* Update name field */\n  const inp=document.getElementById('mf-name-input');\n  if(inp&&!inp.value&&state.name)inp.value=state.name;\n  applyName(state.name||'');\n  document.getElementById('mf-card-rank').textContent=r.name;\n  document.getElementById('mf-card-tier').textContent=r.label;\n  document.getElementById('mf-stat-xp').textContent=state.xp;\n  document.getElementById('mf-stat-correct').textContent=`${correct}/${total}`;\n  document.getElementById('mf-stat-streak').textContent=state.bestStreak;\n  document.getElementById('mf-stat-reflect').textContent=state.reflections.length;\n  /* badges */\n  const badges=[];\n  if(correct===total)badges.push({cls:'perfect',txt:'✓ Perfect score'});\n  if(state.bestStreak>=3)badges.push({cls:'streak',txt:`🔥 ${state.bestStreak}-streak`});\n  const sureRight=Object.values(state.answers).filter(a=>a.correct&&a.wager===3).length;\n  if(sureRight>=2)badges.push({cls:'',txt:`🎯 Confident & correct ×${sureRight}`});\n  const humility=Object.values(state.answers).filter(a=>!a.correct&&a.wager<3).length;\n  if(humility>=1)badges.push({cls:'humility',txt:`🪞 Humility ×${humility}`});\n  if(state.reflections.length>=3)badges.push({cls:'',txt:`💭 Deep thinker · ${state.reflections.length} reflections`});\n  if(state.xp>=20)badges.push({cls:'',txt:'🛡 Champion-grade'});\n  const bw=document.getElementById('mf-badges');\n  if(badges.length){bw.innerHTML=badges.map(b=>`<span class=\"mf-badge ${b.cls}\">${b.txt}<\u002Fspan>`).join('')}\n  else{bw.innerHTML=`<span class=\"mf-empty\">Earn badges by answering quizzes confidently and reflecting along the way.<\u002Fspan>`}\n  /* date */\n  const d=new Date();const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\n  state._dateStr=`${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}`;\n}\nfunction applyName(n){\n  const card=document.getElementById('mf-card-name');\n  if(!card)return;\n  if(n&&n.trim()){card.textContent=n;card.classList.remove('empty')}\n  else{card.textContent='Your name appears here';card.classList.add('empty')}\n  document.getElementById('mf-commit-name').textContent=n&&n.trim()?n:'_______';\n}\ndocument.addEventListener('input',e=>{\n  if(e.target.id==='mf-name-input'){state.name=e.target.value;applyName(e.target.value);saveState()}\n});\nfunction showToast(msg){const t=document.getElementById('mf-toast');t.textContent=msg;t.classList.add('on');clearTimeout(showToast._t);showToast._t=setTimeout(()=>t.classList.remove('on'),2200)}\n\nfunction manifestoText(){\n  const r=rankFor(state.xp);\n  const correct=Object.values(state.answers).filter(a=>a.correct).length;\n  const name=state.name||'(unsigned)';\n  return `SECURITY CHAMPIONS PROGRAM — MANIFESTO\n─────────────────────────────────────\nName:   ${name}\nRank:   ${r.name}  (${r.label})\nXP:     ${state.xp}\nQuiz:   ${correct}/6 correct\nStreak: ${state.bestStreak} best\nReflections: ${state.reflections.length}\n\nCommitment:\nI, ${name}, will bring one idea from this module\ninto my next standup, design review, or 1:1 — and\nstart one security conversation that wouldn't have\nhappened otherwise.\n\nDate: ${document.getElementById('mf-date').textContent}`;\n}\nfunction copyManifestoText(){\n  navigator.clipboard.writeText(manifestoText()).then(()=>showToast('Copied to clipboard'),()=>showToast('Copy blocked — long-press to select'));\n}\n\n/* PNG download — draw manifesto directly on Canvas to mirror the on-screen card */\nfunction downloadManifesto(){\n  try{\n    const r=rankFor(state.xp);\n    const correct=Object.values(state.answers).filter(a=>a.correct).length;\n    const name=(state.name||'').trim()||'Champion';\n    /* Match on-screen card aspect: ~540 wide × ~520 tall. Render at 2x */\n    const W=1080,DPR=2,P=64;\n    /* compute height dynamically based on content */\n    const cnv=document.createElement('canvas');\n    /* first measure pass via a ghost ctx */\n    const meas=document.createElement('canvas').getContext('2d');\n    /* badges to draw */\n    const badges=[];\n    if(correct===6)badges.push('✓ Perfect score');\n    if(state.bestStreak>=3)badges.push('🔥 '+state.bestStreak+'-streak');\n    const sureRight=Object.values(state.answers).filter(a=>a.correct&&a.wager===3).length;\n    if(sureRight>=2)badges.push('🎯 Confident ×'+sureRight);\n    const humility=Object.values(state.answers).filter(a=>!a.correct&&a.wager<3).length;\n    if(humility>=1)badges.push('🪞 Humility ×'+humility);\n    if(state.reflections.length>=3)badges.push('💭 Deep thinker');\n    if(state.xp>=20)badges.push('🛡 Champion-grade');\n    const innerW=W-P*2;\n    /* layout heights */\n    const topPad=P+30;\n    const tagH=22+18;\n    const nameH=64+8;\n    const rankH=28+30;\n    const statsH=140+34;\n    const badgesHdr=20+22;\n    /* simulate badge wrapping */\n    meas.font='700 24px \"DM Sans\",sans-serif';\n    let bx=0,bh=44,gap=10,padX=18,bRows=1;\n    badges.forEach(b=>{\n      const tw=meas.measureText(b).width;\n      const bw=tw+padX*2;\n      if(bx+bw>innerW){bx=0;bRows++}\n      bx+=bw+gap;\n    });\n    const badgesRowsH=badges.length?(bh*bRows+gap*(bRows-1)):28;\n    const badgesH=badgesHdr+badgesRowsH+30;\n    const commitHdr=20+22;\n    /* commit text wrap measure */\n    meas.font='italic 22px \"DM Sans\",sans-serif';\n    const commitTxt='I, '+name+', will bring one idea from this module into my next standup, design review, or 1:1 — and start one security conversation that wouldn\\'t have happened otherwise.';\n    const commitLines=measureWrap(meas,commitTxt,innerW-40);\n    const commitH=commitHdr+commitLines.length*30+30+24;\n    const H=topPad+tagH+nameH+rankH+statsH+badgesH+commitH+P;\n    cnv.width=W*DPR;cnv.height=H*DPR;\n    const ctx=cnv.getContext('2d');ctx.scale(DPR,DPR);\n    /* bg */\n    const grad=ctx.createLinearGradient(0,0,0,H);\n    grad.addColorStop(0,'#ffffff');grad.addColorStop(1,'#fbf8f4');\n    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);\n    /* top stripe */\n    ctx.fillStyle='#E8813A';ctx.fillRect(0,0,W,8);\n    let y=topPad;\n    /* tag */\n    ctx.fillStyle='#E8813A';ctx.font='800 18px \"DM Sans\",sans-serif';ctx.textAlign='left';\n    ctx.fillText('SECURITY CHAMPIONS PROGRAM · 2026',P,y);y+=tagH;\n    /* name */\n    ctx.fillStyle='#1a1a1a';ctx.font='700 56px \"DM Sans\",sans-serif';\n    ctx.fillText(name,P,y+8);y+=nameH;\n    /* rank line */\n    ctx.font='400 22px \"DM Sans\",sans-serif';ctx.fillStyle='#4A4A4A';\n    ctx.fillText('Rank: ',P,y);\n    let rx=P+ctx.measureText('Rank: ').width;\n    ctx.fillStyle='#E8813A';ctx.font='700 22px \"DM Sans\",sans-serif';\n    ctx.fillText(r.name,rx,y);\n    rx+=ctx.measureText(r.name).width;\n    ctx.fillStyle='#4A4A4A';ctx.font='400 22px \"DM Sans\",sans-serif';\n    ctx.fillText(' · '+r.label,rx,y);y+=rankH;\n    /* stats */\n    const stats=[\n      {n:String(state.xp),l:'XP EARNED',accent:true},\n      {n:correct+'/6',l:'QUIZZES'},\n      {n:String(state.bestStreak),l:'BEST STREAK'},\n      {n:String(state.reflections.length),l:'REFLECTIONS'}\n    ];\n    const sw=innerW/4,sh=140;\n    ctx.strokeStyle='#eeeeee';ctx.lineWidth=2;\n    roundRect(ctx,P,y,innerW,sh,10);ctx.stroke();\n    stats.forEach((s,i)=>{\n      const sx=P+sw*i;\n      if(i>0){ctx.beginPath();ctx.moveTo(sx,y+8);ctx.lineTo(sx,y+sh-8);ctx.stroke()}\n      ctx.fillStyle=s.accent?'#E8813A':'#1a1a1a';\n      ctx.font='800 50px \"DM Sans\",sans-serif';ctx.textAlign='center';\n      ctx.fillText(s.n,sx+sw/2,y+72);\n      ctx.fillStyle='#888';ctx.font='800 13px \"DM Sans\",sans-serif';\n      ctx.fillText(s.l,sx+sw/2,y+108);\n    });\n    ctx.textAlign='left';y+=statsH;\n    /* badges header */\n    ctx.fillStyle='#888';ctx.font='800 14px \"DM Sans\",sans-serif';\n    ctx.fillText('BADGES EARNED',P,y);y+=badgesHdr;\n    if(badges.length===0){\n      ctx.fillStyle='#aaa';ctx.font='italic 16px \"DM Sans\",sans-serif';\n      ctx.fillText('No badges yet — retake to earn them.',P,y+8);\n    }else{\n      ctx.font='700 16px \"DM Sans\",sans-serif';\n      let bxx=P,byy=y;\n      badges.forEach(b=>{\n        const tw=ctx.measureText(b).width;\n        const bw=tw+padX*2;\n        if(bxx+bw>P+innerW){bxx=P;byy+=bh+gap}\n        ctx.fillStyle='rgba(232,129,58,.13)';\n        roundRect(ctx,bxx,byy,bw,bh,bh/2);ctx.fill();\n        ctx.fillStyle='#C76B2A';\n        ctx.fillText(b,bxx+padX,byy+bh/2+5);\n        bxx+=bw+gap;\n      });\n    }\n    y+=badgesH-badgesHdr;\n    /* commitment */\n    ctx.fillStyle='#888';ctx.font='800 14px \"DM Sans\",sans-serif';\n    ctx.fillText('COMMITMENT',P,y);y+=commitHdr;\n    const cBoxH=commitLines.length*30+30;\n    ctx.fillStyle='#fdf6ee';\n    roundRect(ctx,P,y,innerW,cBoxH,8);ctx.fill();\n    ctx.fillStyle='#E8813A';ctx.fillRect(P,y,4,cBoxH);\n    ctx.fillStyle='#1a1a1a';ctx.font='italic 22px \"DM Sans\",sans-serif';\n    let cy=y+34;\n    commitLines.forEach(line=>{ctx.fillText(line,P+22,cy);cy+=30});\n    /* download */\n    cnv.toBlob(blob=>{\n      if(!blob){showToast('Image export blocked — try copy text instead');return}\n      try{\n        const a=document.createElement('a');\n        const dlUrl=URL.createObjectURL(blob);\n        a.href=dlUrl;\n        const safeName=(state.name||'champion').replace(/[^a-z0-9]+/gi,'-').toLowerCase()||'champion';\n        a.download='security-champion-manifesto-'+safeName+'.png';\n        document.body.appendChild(a);a.click();a.remove();\n        setTimeout(()=>URL.revokeObjectURL(dlUrl),1500);\n        showToast('Manifesto downloaded');\n      }catch(err){\n        console.warn(err);\n        showToast('Download blocked here — try copy text instead');\n      }\n    },'image/png');\n  }catch(err){\n    console.error(err);\n    showToast('Image export failed — try copy text instead');\n  }\n}\nfunction measureWrap(ctx,text,maxW){\n  const words=text.split(' ');const lines=[];let line='';\n  for(let i=0;i<words.length;i++){\n    const test=line?(line+' '+words[i]):words[i];\n    if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=words[i]}\n    else line=test;\n  }\n  if(line)lines.push(line);return lines;\n}\nfunction roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}\nfunction resetCourse(){\n  if(!confirm('Reset all progress and start over?'))return;\n  localStorage.removeItem(STORAGE_KEY);\n  state={...DEFAULT_STATE,answers:{},wagers:{},reflections:[]       style.textContent += 'html,body{height:100%!important;overflow:hidden!important;margin:0!important;background:#1A1A1A!important}.lms-main{height:100%!important;overflow:hidden!important}.deck{height:100%!important;padding:0!important}.slide.on{height:100%!important;display:flex!important;flex-direction:column!important;overflow:hidden!important}.sb{flex:1!important;display:flex!important;flex-direction:column!important;overflow:hidden!important;min-height:0!important}.split{flex:1!important;min-height:0!important;overflow:hidden!important}.sp-r{flex:1!important;min-height:0!important;overflow-y:auto!important}.fbody{flex:1!important;min-height:0!important;overflow:hidden!important}.breather{flex:1!important;min-height:0!important;overflow:hidden!important}.manifesto-wrap{flex:1!important;min-height:0!important;overflow-y:auto!important}.sh,.sf{flex-shrink:0!important}.is-fs .sp-l{padding:36px 32px!important}.is-fs .sp-l .sp-t{font-size:30px!important}.is-fs .sp-r{padding:36px 48px!important;gap:20px!important}.is-fs .prose{font-size:22px!important;line-height:1.8!important}.is-fs .xh{font-size:19px!important;padding:16px 24px!important}.is-fs .xb{font-size:19px!important;padding:20px 24px!important}.is-fs .qq{font-size:24px!important}.is-fs .qo{font-size:19px!important;padding:16px 22px!important;margin-bottom:8px!important}.is-fs .qe{font-size:19px!important;padding:18px 22px!important}.is-fs .co{font-size:19px!important;padding:18px 24px!important}.is-fs .wager{padding:16px 22px!important}.is-fs .wb-name{font-size:18px!important}.is-fs .wb-sub{font-size:15px!important}.is-fs .fbody{padding:56px 96px!important;gap:72px!important}.is-fs .fb-tt{font-size:clamp(42px,5.5vw,64px)!important}.is-fs .fb-sb{font-size:22px!important}.is-fs .fb-visual{width:300px!important;height:300px!important}.is-fs .breather-caption p{font-size:20px!important}';

      var baseH=0;
      function checkSize(){
        if(!baseH&&window.innerHeight>0)baseH=window.innerHeight;
        var isFS=baseH>0&&window.innerHeight>baseH*1.15;
        document.documentElement.classList.toggle('is-fs',isFS);
      }
      setInterval(checkSize,500);
      checkSize();
    }
    document.head.appendChild(style);

    /* ── Patch manifestoText (fix mf-date crash) ── */
    try {
      window.manifestoText=function(){
        var r=rankFor(state.xp);
        var correct=Object.values(state.answers).filter(function(a){return a.correct}).length;
        var d=new Date();var mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return 'SECURITY CHAMPIONS PROGRAM\nRank: '+r.name+' ('+r.label+')\nXP: '+state.xp+'\nQuiz: '+correct+'/6\nStreak: '+state.bestStreak+'\nReflections: '+state.reflections.length+'\nDate: '+d.getDate()+' '+mo[d.getMonth()]+' '+d.getFullYear();
      };
    }catch(e){}

    /* ── Patch applyName to not crash on removed mf-commit-name ── */
    try {
      window.applyName=function(){};
    }catch(e){}

    /* ── Patch resetCourse for LMS iframe ── */
    try {
      window.resetCourse=function(){
        try{localStorage.removeItem('sc_course_v4_state')}catch(e){}
        state.xp=0;state.streak=0;state.bestStreak=0;
        state.answers={};state.wagers={};state.reflections=[];
        state.name='';state.startedAt=Date.now();
        try{saveState()}catch(e){}
        document.querySelectorAll('.qo').forEach(function(o){o.classList.remove('pk','ok','no');o.disabled=false;o.style.cursor='pointer'});
        document.querySelectorAll('.qe').forEach(function(e){e.classList.remove('sh');var sc=e.querySelector('.qe-score');if(sc)sc.remove()});
        document.querySelectorAll('.wager').forEach(function(w){
          w.classList.remove('locked');
          var note=w.querySelector('.wager-locked-note');
          if(note){
            var qid=w.dataset.qid;
            w.innerHTML='<div class="wager-lab">How confident are you?</div><div class="wager-row"><button class="wager-btn" data-w="sure" data-m="3"><div class="wb-top"><span class="wb-mult">\u00d73</span><span class="wb-name">Sure</span></div><div class="wb-sub">\u00d73 if right \u00b7 0 if wrong</div></button><button class="wager-btn" data-w="pretty" data-m="2"><div class="wb-top"><span class="wb-mult">\u00d72</span><span class="wb-name">Pretty sure</span></div><div class="wb-sub">\u00d72 if right \u00b7 1 if wrong</div></button><button class="wager-btn" data-w="guess" data-m="1"><div class="wb-top"><span class="wb-mult">\u00d71</span><span class="wb-name">Just guessing</span></div><div class="wb-sub">\u00d71 either way</div></button></div>';
            w.querySelectorAll('.wager-btn').forEach(function(btn){
              btn.onclick=function(){
                if(w.classList.contains('locked'))return;
                w.querySelectorAll('.wager-btn').forEach(function(b){b.classList.remove('pk')});
                btn.classList.add('pk');
                state.wagers[qid]=parseInt(btn.dataset.m,10);
                try{saveState()}catch(e){}
              };
            });
          } else {
            w.querySelectorAll('.wager-btn').forEach(function(b){b.classList.remove('pk');b.disabled=false});
          }
        });
        try{renderChips()}catch(e){}
        try{go(0)}catch(e){}
        try{showToast('Progress reset \u2014 starting fresh')}catch(e){}
      };
    }catch(e){}

    /* ── Fix manifesto texts ── */
    /* Remove year from card tag */
    var cardTag=document.querySelector('.mf-card-tag');
    if(cardTag) cardTag.textContent='Security Champions Program';

    /* Fix subtitle */
    var mfSubs=document.querySelectorAll('.mf-sb');
    mfSubs.forEach(function(el){
      if(el.textContent.indexOf('Save it')>=0){
        el.textContent='Security Champions are not certified \u2014 they are recognized by impact. This is your record from today.';
      }
    });

    /* Rewrite commitment without name */
    var commitEl=document.querySelector('.mf-commit');
    if(commitEl){
      commitEl.innerHTML='I will bring one idea from this module into my next standup, design review, or 1:1 \u2014 and start <b>one</b> security conversation that wouldn\u2019t have happened otherwise.';
    }

    /* Remove buttons: Download PNG, Copy text */
    var actions=document.querySelector('.mf-actions');
    if(actions){
      actions.querySelectorAll('.btn').forEach(function(b){
        var txt=b.textContent.trim();
        if(txt.indexOf('Download')>=0||txt.indexOf('Copy')>=0) b.remove();
      });
    }

    /* ── FS button ── */
    var btn=document.createElement('button');
    btn.className='fs-btn';btn.title='Full Screen';
    btn.setAttribute('aria-label','Toggle fullscreen');
    btn.innerHTML='<svg class="fs-expand" width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,5 1,1 5,1"/><polyline points="9,1 13,1 13,5"/><polyline points="13,9 13,13 9,13"/><polyline points="5,13 1,13 1,9"/></svg><svg class="fs-collapse" width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polyline points="5,1 5,5 1,5"/><polyline points="9,5 13,5 9,1"/><polyline points="9,13 9,9 13,9"/><polyline points="1,9 5,9 5,13"/></svg>';
    function doFS(){var el=document.documentElement;if(!document.fullscreenElement&&!document.webkitFullscreenElement){if(el.requestFullscreen)el.requestFullscreen();else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen()}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen()}}
    document.querySelectorAll('.sh').forEach(function(sh){var clone=btn.cloneNode(true);clone.onclick=doFS;var shRight=sh.querySelector('.sh-right');if(shRight){shRight.insertBefore(clone,shRight.firstChild)}else{sh.appendChild(clone)}});
    function updFS(){var isFS=!!(document.fullscreenElement||document.webkitFullscreenElement);document.querySelectorAll('.fs-btn').forEach(function(b){b.classList.toggle('active',isFS);b.title=isFS?'Exit Full Screen':'Full Screen'});document.querySelectorAll('.fs-expand').forEach(function(i){i.style.display=isFS?'none':''});document.querySelectorAll('.fs-collapse').forEach(function(i){i.style.display=isFS?'':'none'});setTimeout(function(){if(typeof fitAllScenes==='function')fitAllScenes()},150)}
    document.addEventListener('fullscreenchange',updFS);
    document.addEventListener('webkitfullscreenchange',updFS);
    setTimeout(function(){if(typeof fitAllScenes==='function')fitAllScenes()},200);
  },80);
})();

  </script>
