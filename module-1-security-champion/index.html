  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

code-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"8fc3d827-bac2-46c0-8e90-08752e4df455\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n:root{--bk:#1A1A1A;--wh:#FFF;--ow:#F5F5F5;--card:#F0F0F0;--bd:#E0E0E0;--td:#1A1A1A;--tm:#4A4A4A;--mu:#888;--or:#E8813A;--ol:rgba(232,129,58,.12);--od:#C76B2A;--gr:#2EAD6B;--gl:rgba(46,173,107,.12);--rd:#D94545;--rl:rgba(217,69,69,.10);--bl:#4A8FD4;--pu:#7B6FAE}\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}\nhtml,body{height:100%;overflow:hidden}\nbody{background:var(--bk);font-family:'DM Sans',system-ui,sans-serif;color:var(--td);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}\n.lms-main{flex:1;overflow-y:auto;width:100%;scrollbar-width:thin}\n.deck{width:100%;max-width:920px;margin:0 auto;padding:24px 16px 60px}\n.slide{display:none;flex-direction:column;background:var(--wh);border:none;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.08)}\n.slide.on{display:flex;animation:slide-in .35s cubic-bezier(.2,.6,.2,1) both}\n@keyframes slide-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}\n\n/* Act progress (replaces dense pip strip) */\n.act-prog{display:flex;gap:6px;align-items:center}\n.act-seg{display:flex;flex-direction:column;align-items:flex-start;gap:3px;cursor:pointer;padding:0;border:none;background:none;font-family:inherit}\n.act-seg .as-bar{height:3px;width:60px;border-radius:2px;background:rgba(255,255,255,.12);position:relative;overflow:hidden}\n.act-seg .as-fill{position:absolute;inset:0;background:var(--or);transform:scaleX(0);transform-origin:left;transition:transform .4s ease;border-radius:2px}\n.act-seg .as-lab{font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,.3);font-weight:600;text-transform:uppercase}\n.act-seg.cur .as-lab{color:rgba(255,255,255,.85)}\n.act-seg.done .as-fill{transform:scaleX(1);background:rgba(232,129,58,.45)}\n.act-seg.cur .as-fill{transform:scaleX(var(--p,0))}\n\n/* Reduced motion — calm everything down */\n@media (prefers-reduced-motion:reduce){\n  .slide.on{animation:none}\n  *,*::before,*::after{animation-duration:.001s!important;animation-iteration-count:1!important;transition-duration:.01s!important}\n  .breather-visual *[class*=\"-anim\"], .k-person-wrap, .para-group, .cp-or, .new-champ, .panic-mark, .resigned-label, .pt3-glow, .pt3-shield, .pt3-check, .pt3-label, .pconn, .k-q, .steam, .k-c1, .k-c3{animation:none!important;opacity:1!important}\n}\n\n/* Header & Footer */\n.sh{background:var(--bk);padding:8px 20px;display:flex;align-items:center;justify-content:space-between}\n.stag{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.45);font-weight:600;text-transform:uppercase}\n.stag .hl{color:var(--or)}\n.sf{background:var(--bk);padding:8px 20px;display:flex;align-items:center;justify-content:space-between}\n.shint{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:2px;text-transform:uppercase;font-weight:600}\n.snav{display:flex;gap:8px}\n.btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}\n.btn:hover{background:rgba(255,255,255,.15);color:#fff}\n.btn.pri{background:var(--or);border-color:var(--or);color:#fff;font-weight:600}\n.btn.pri:hover{background:var(--od)}\n.btn.reflect-btn{border-color:rgba(232,129,58,.4);color:var(--or);background:rgba(232,129,58,.06)}\n.btn.reflect-btn:hover{background:rgba(232,129,58,.15);color:#fff}\n\n/* ═══ REFLECTION MODAL (overlay — does not change slide layout) ═══ */\n#reflect-modal{position:fixed;inset:0;background:rgba(8,6,12,.78);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:9998;padding:20px;animation:rm-fade .25s ease}\n#reflect-modal.on{display:flex}\n@keyframes rm-fade{from{opacity:0}to{opacity:1}}\n.rm-card{background:linear-gradient(170deg,#1c1820,#181820);border:1px solid rgba(232,129,58,.35);border-radius:14px;padding:36px 40px 28px;max-width:560px;width:100%;text-align:center;color:#F5F2ED;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.6);animation:rm-rise .3s ease}\n@keyframes rm-rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}\n.rm-tag{font-size:10px;letter-spacing:4px;color:var(--or);font-weight:700;text-transform:uppercase;margin-bottom:18px}\n.rm-q{font-size:22px;line-height:1.45;font-weight:300;margin-bottom:14px;text-wrap:pretty;color:#F5F2ED}\n.rm-q em{color:var(--or);font-style:normal;font-weight:600}\n.rm-sub{font-size:13px;color:rgba(255,255,255,.55);line-height:1.6;margin:0 auto 24px;max-width:440px}\n.rm-actions{display:flex;gap:10px;justify-content:center}\n.rm-close{position:absolute;top:12px;right:14px;background:none;border:none;color:rgba(255,255,255,.4);font-size:20px;cursor:pointer;width:28px;height:28px;line-height:1;border-radius:6px;transition:all .15s}\n.rm-close:hover{background:rgba(255,255,255,.08);color:#fff}\n@media(max-width:520px){\n  .rm-card{padding:28px 22px 22px;max-width:100%}\n  .rm-q{font-size:18px}\n  .rm-sub{font-size:12px}\n}\n.pips{display:flex;gap:3px;align-items:center}\n.pip{width:14px;height:3px;border-radius:2px;background:rgba(255,255,255,.15);cursor:pointer;border:none;padding:0;transition:all .15s}\n.pip.on{background:var(--or);transform:scaleY(1.8)}\n\n/* ═══ SCORE CHIP (header, all slides) ═══ */\n.scorechip{display:inline-flex;align-items:center;ga width:90px;background:#fff;border:1.5px solid var(--bd);border-radius:6px;padding:8px 10px;cursor:pointer;font-family:inherit;text-align:left;transition:all .12s}\n.wager-btn:hover{border-color:var(--or);transform:translateY(-1px);box-shadow:0 2px 8px rgba(232,129,58,.15)}\n.wager-btn.pk{border-color:var(--or);background:var(--ol)}\n.wager-btn.pk .wb-mult{background:var(--or);color:#fff}\n.wager-btn:disabled{cursor:not-allowed;opacity:.5}\n.wb-top{display:flex;align-items:center;gap:6px;margin-bottom:2px}\n.wb-mult{display:inline-flex;align-items:center;justify-content:center;background:var(--card);color:var(--td);font-size:10px;font-weight:800;padding:1px 6px;border-radius:10px;letter-spacing:.3px;transition:all .12s}\n.wb-name{font-size:13px;font-weight:700;color:var(--td)}\n.wb-sub{font-size:11px;color:var(--mu);line-height:1.3}\n.wager-locked-note{font-size:11px;color:var(--mu);font-style:italic;display:flex;align-items:center;gap:6px}\n.wager-locked-note b{color:var(--td);font-style:normal;font-weight:600}\n\n/* Score popup on quiz reveal */\n.qe .qe-score{margin-top:10px;padding-top:10px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:10px;font-size:13px}\n.qe .qe-score .qs-pts{display:inline-flex;align-items:center;gap:4px;background:var(--gl);color:var(--gr);font-weight:800;padding:3px 9px;border-radius:12px;font-size:12px;letter-spacing:.3px}\n.qe .qe-score .qs-pts.zero{background:var(--rl);color:var(--rd)}\n.qe .qe-score .qs-pts.humility{background:rgba(123,111,174,.12);color:var(--pu)}\n.qe .qe-score .qs-msg{color:var(--tm);font-size:12px}\n\n/* ═══ MANIFESTO (final slide) ═══ */\n.manifesto-wrap{padding:32px 40px 28px;background:var(--bk);min-height:520px;display:flex;flex-direction:column;align-items:center;gap:18px}\n.mf-intro{text-align:center;max-width:540px}\n.mf-intro .mf-tg{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:4px;color:var(--or);margin-bottom:10px}\n.mf-intro .mf-tt{font-size:30px;font-weight:700;color:#fff;line-height:1.15;letter-spacing:-.01em;margin-bottom:8px}\n.mf-intro .mf-sb{font-size:13px;color:rgba(255,255,255,.55);line-height:1.6}\n.mf-name-row{display:flex;gap:8px;align-items:center;width:100%;max-width:440px}\n.mf-name-row label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.5)}\n.mf-name-row input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:8px 12px;color:#fff;font-family:inherit;font-size:14px;outline:none;transition:all .15s}\n.mf-name-row input:focus{border-color:var(--or);background:rgba(232,129,58,.06)}\n\n/* Card itself */\n.mf-card{width:100%;max-width:540px;background:linear-gradient(168deg,#fff,#fbf8f4);border-radius:10px;padding:30px 32px 26px;color:#1a1a1a;position:relative;box-shadow:0 30px 60px rgba(0,0,0,.5);border-top:4px solid var(--or)}\n.mf-card-tag{font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--or);margin-bottom:6px}\n.mf-card-name{font-size:22px;font-weight:700;line-height:1.15;margin-bottom:2px;min-height:26px}\n.mf-card-name.empty{color:#bbb;font-style:italic;font-weight:400}\n.mf-card-rank{font-size:12px;color:var(--tm);margin-bottom:18px}\n.mf-card-rank b{color:var(--or);font-weight:700}\n.mf-stats{display:flex;gap:0;border:1px solid #eee;border-radius:8px;overflow:hidden;margin-bottom:16px}\n.mf-stat{flex:1;padding:10px 8px;text-align:center;border-right:1px solid #eee}\n.mf-stat:last-child{border-right:none}\n.mf-stat .ms-n{font-size:20px;font-weight:800;color:var(--td);line-height:1}\n.mf-stat .ms-l{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mu);margin-top:4px}\n.mf-stat.accent .ms-n{color:var(--or)}\n.mf-section{margin-bottom:14px}\n.mf-section-h{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:6px}\n.mf-badges{display:flex;flex-wrap:wrap;gap:5px}\n.mf-badge{display:inl x;overflow-y:auto}\n.sp-r::-webkit-scrollbar{width:3px}\n.sp-r::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}\n\n/* Full-black section divider */\n.fbody{background:var(--bk);padding:44px 48px;display:flex;align-items:center;gap:48px;min-height:480px;position:relative;overflow:hidden}\n.fb-content{flex:1;z-index:1}\n.fb-tg{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:4px;color:var(--or);margin-bottom:14px}\n.fb-tt{font-size:38px;font-weight:700;color:var(--wh);line-height:1.12;letter-spacing:-.02em;margin-bottom:18px;max-width:600px}\n.fb-sb{font-size:16px;color:rgba(255,255,255,.55);line-height:1.75;max-width:520px}\n.fb-m{display:flex;gap:18px;margin-top:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.25)}\n.fb-visual{flex-shrink:0;width:240px;height:240px;display:flex;align-items:center;justify-content:center;z-index:1}\n\n/* Content components */\n.prose{font-size:16px;color:var(--tm);line-height:1.8}\n.prose strong{color:var(--td);font-weight:600}\n.xp{margin:4px 0}\n.xh{display:flex;align-items:center;justify-content:space-between;width:100%;background:var(--card);border:none;border-radius:6px;padding:12px 16px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;color:var(--td);text-align:left;transition:background .1s}\n.xh:hover{background:#e5e5e5}\n.xh .xi{font-size:11px;margin-right:8px}\n.xa{font-size:13px;color:var(--mu);transition:transform .18s;margin-left:8px}.xa.op{transform:rotate(90deg);color:var(--or)}\n.xb{display:none;padding:14px 16px;background:var(--ow);border-radius:0 0 6px 6px;font-size:14px;color:var(--tm);line-height:1.7}\n.xb.op{display:block}.xb strong{color:var(--td);font-weight:600}\n.xb-q{font-style:italic;color:var(--td);padding:10px 14px;background:var(--wh);border-left:3px solid var(--or);border-radius:0 6px 6px 0;margin-bottom:8px;font-size:13px;line-height:1.65}\n.xb-n{font-size:12px;color:var(--mu);line-height:1.6}\n.qw{margin:6px 0}\n.qq{font-size:16px;font-weight:700;color:var(--td);margin-bottom:12px;line-height:1.4}\n.qo{display:block;width:100%;background:var(--card);border:2px solid transparent;border-radius:7px;padding:11px 14px;margin-bottom:5px;cursor:pointer;font-family:inherit;font-size:14px;color:var(--td);text-align:left;transition:all .12s}\n.qo:hover:not(.pk){border-color:var(--or);background:var(--ol)}\n.qo.ok{border-color:var(--gr);background:var(--gl)}\n.qo.no{border-color:var(--rd);background:var(--rl);opacity:.55}\n.qo.pk{cursor:default}\n.qe{display:none;margin-top:8px;padding:12px 16px;background:var(--ow);border-radius:7px;font-size:14px;color:var(--tm);line-height:1.65}.qe.sh{display:block}.qe strong{color:var(--td)}\n.co{border-left:3px solid var(--or);padding:12px 16px;background:var(--ol);font-size:14px;color:var(--td);line-height:1.6;border-radius:0 7px 7px 0;margin:4px 0}\n.lw{display:flex;flex-direction:column;gap:5px}\n.lr{display:flex;flex-direction:column;cursor:pointer;border-radius:5px;overflow:hidden;transition:transform .1s}\n.lr:hover{transform:translateX(3px)}\n.lr-t{display:flex;align-items:stretch}\n.lr-l{color:#fff;font-size:11px;font-weight:700;padding:8px 10px;min-width:74px;display:flex;align-items:center}\n.lr-x{background:var(--ol);flex:1;padding:8px 12px;font-size:12px;color:var(--td);line-height:1.4}\n.lr-d{display:none;background:var(--ow);padding:7px 12px;font-size:12px;color:var(--tm);line-height:1.55}\n.lr.ex .lr-d{display:block}\n.lr:nth-child(1) .lr-l{background:var(--or)}.lr:nth-child(2) .lr-l{background:#D4845A}.lr:nth-child(3) .lr-l{background:#C0876A}.lr:nth-child(4) .lr-l{background:#AC8A7A}.lr:nth-child(5) .lr-l{background:#988D8A}.lr:nth-child(6) .lr-l{background:#748090}.lr:nth-child(7) .lr-l{background:#607080}\n\n/* Fade-in for content */\n@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}\n.slide.on .sp-r>*{animation:fi .2s ease both}\n.slide.on .sp-r>*:nth-child(1){ani :scale(.5) translateY(10px)}\n  64%{opacity:1;transform:scale(1.18) translateY(-4px)}\n  68%,90%{opacity:1;transform:scale(1) translateY(0)}\n  95%,100%{opacity:0}\n}\n.pt3-shield path:nth-child(2){stroke-dasharray:14;stroke-dashoffset:14;animation:check-stroke 12s ease-in-out infinite}\n@keyframes check-stroke{0%,64%{stroke-dashoffset:14}70%,90%{stroke-dashoffset:0}95%,100%{stroke-dashoffset:14}}\n.pt3-check{display:none}\n.pt3-label{position:absolute;bottom:54px;left:calc(42% - 18px);font-size:10px;color:var(--or);font-weight:700;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;opacity:0;animation:int-label 12s ease-in-out infinite}\n@keyframes int-label{0%,62%{opacity:0}68%,90%{opacity:1}95%,100%{opacity:0}}\n\n/* Connection lines */\n.pconn{stroke:var(--or);stroke-width:1;opacity:0;stroke-dasharray:4,4;stroke-dashoffset:40;animation:pconn-draw 12s ease-in-out infinite}\n@keyframes pconn-draw{0%,68%{opacity:0;stroke-dashoffset:40}74%,88%{opacity:.55;stroke-dashoffset:0}94%,100%{opacity:0}}\n.pconn:nth-of-type(2){animation-delay:.15s}\n.pconn:nth-of-type(3){animation-delay:.3s}\n.pconn:nth-of-type(4){animation-delay:.45s}\n\n/* ═══ MUSICAL CHAIRS (revised + enlarged) ═══ */\n.chairs-box{width:640px;max-width:100%;height:300px;position:relative;overflow:hidden;border-radius:10px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06)}\n.chair-row{display:flex;justify-content:center;gap:64px;position:absolute;bottom:48px;left:0;right:0;padding:0 64px}\n.chair{position:relative;width:88px;text-align:center}\n.chair-seat{width:74px;height:12px;background:rgba(255,255,255,.12);border-radius:4px;margin:0 auto}\n.chair-person{position:absolute;bottom:14px;left:50%;transform:translateX(-50%)}\n.chair-person svg{width:42px;height:64px}\n/* Shield above each champion */\n.ch-shield{position:absolute;top:-32px;left:50%;transform:translateX(-50%);width:22px;height:25px}\n.ch-shield-anim{animation:shield-fade 8s ease-in-out infinite}\n@keyframes s city:0}}\n/* New champion arrives later, carrying shield */\n.new-champ{position:absolute;bottom:62px;left:calc(50% - 52px);opacity:0;animation:new-arrive 8s ease-in-out infinite}\n@keyframes new-arrive{\n  0%,62%{opacity:0;transform:translateX(80px)}\n  72%{opacity:1;transform:translateX(12px)}\n  78%,96%{opacity:1;transform:translateX(0)}\n  100%{opacity:1;transform:translateX(0)}\n}\n.new-champ svg{width:42px;height:64px}\n.new-champ-shield{position:absolute;top:-26px;left:50%;transform:translateX(-50%);opacity:0;animation:new-shield 8s ease-in-out infinite;width:22px;height:25px}\n@keyframes new-shield{0%,68%{opacity:0;transform:translateX(-50%) scale(.5)}76%{opacity:1;transform:translateX(-50%) scale(1.15)}82%,100%{opacity:1;transform:translateX(-50%) scale(1)}}\n\n/* ═══ SECTION DIVIDER ANIMATIONS ═══ */\n@keyframes hex-rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}\n@keyframes hex-pulse{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:.45;transform:scale(1.1)}}\n@keyframes shield-glow{0%,100%{filter:drop-shadow(0 0 12px rgba(232,129,58,.4))}50%{filter:drop-shadow(0 0 30px rgba(232,129,58,.8))}}\n.hex-orbit{animation:hex-rotate 20s linear infinite;transform-origin:center}\n.hex-pulse-ring{animation:hex-pulse 3s ease-in-out infinite}\n.shield-icon{animation:shield-glow 3s ease-in-out infinite}\n\n@keyframes orbit-shield{0%{transform:rotate(0deg) translateX(55px) rotate(0deg)}100%{transform:rotate(360deg) translateX(55px) rotate(-360deg)}}\n@keyframes person-breathe{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}\n@keyframes shield-orbit-glow{0%,100%{opacity:.7}50%{opacity:1}}\n.person-group{animation:person-breathe 4s ease-in-out infinite;transform-origin:center}\n.orbit-shield{animation:orbit-shield 6s linear infinite;transform-origin:50px 60px}\n.orbit-shield-glow{animation:shield-orbit-glow 3s ease-in-out infinite}\n\n@keyframes draw-line{0%{stroke-dashoffset:200}100%{stroke-dashoffset:0}}\n@keyframes dot-pop{0%,20%{r:0;opacity:0}30%,100%{r:5;opacity:1}}\n.step-line{stroke-dasharray:200;animation:draw-line 4s ease-in-out infinite}\n.step-dot{animation:dot-pop 4s ease-in-out infinite}\n.step-dot:nth-child(2){animation-delay:.3s}.step-dot:nth-child(3){animation-delay:.6s}.step-dot:nth-child(4){animation-delay:.9s}.step-dot:nth-child(5){animation-delay:1.2s}.step-dot:nth-child(6){animation-delay:1.5s}.step-dot:nth-child(7){animation-delay:1.8s}\n\n@keyframes gear-spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}\n@keyframes heart-beat{0%,100%{transform:scale(1)}15%{transform:scale(1.15)}30%{transform:scale(1)}}\n.gear-outer{animation:gear-spin 12s linear infinite;transform-origin:center}\n.heart-core{animation:heart-beat 2s ease-in-out infinite;transform-origin:center}\n\n@keyframes draw-check{0%{stroke-dashoffset:120}60%{stroke-dashoffset:0}100%{stroke-dashoffset:0}}\n@keyframes circle-draw{0%{stroke-dashoffset:283}50%{stroke-dashoffset:0}100%{stroke-dashoffset:0}}\n@keyframes check-glow{0%,50%{filter:none}60%,80%{filter:drop-shadow(0 0 18px rgba(46,173,107,.7))}100%{filter:none}}\n.check-circle{stroke-dasharray:283;animation:circle-draw 3s ease-in-out infinite}\n.check-mark{stroke-dasharray:120;animation:draw-check 3s ease-in-out infinite}\n.check-group{animation:check-glow 3s ease-in-out infinite}\n\n/* ═══ GLOSSARY POPOVERS (JS-driven, escapes overflow ancestors) ═══ */\n.gloss{border-bottom:1px dotted currentColor;cursor:help;color:inherit;font-weight:700}\n.co .gloss{border-bottom-color:var(--or)}\n#gloss-tip{position:fixed;background:#1a1620;color:#F5F2ED;font-size:12px;font-weight:400;line-height:1.5;letter-spacing:.1px;padding:10px 12px;border-radius:6px;border:1px solid rgba(232,129,58,.4);box-shadow:0 8px 28px rgba(0,0,0,.55);max-width:280px;width:max-content;opacity:0;visibility:hidden;transform:translateY(4px);transition:opacity .18s,transform .18s,visibility .18s;pointer-events:none;z-index:9999;text-align:left;font-family:inherit}\n#gloss-tip.on{opacity:1;visibility:visible;transform:translateY(0)}\n#gloss-tip::after{content:'';position:absolute;left:14px;top:100%;width:0;height:0;border:6px solid transparent;border-top-color:rgba(232,129,58,.5)}\n#gloss-tip.below::after{top:auto;bottom:100%;border-top-color:transparent;border-bottom-color:rgba(232,129,58,.5)}\n\n/* ═══ (background layers removed — insufficient space in LMS iframe) ═══ */\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<main class=\"lms-main\">\n<div class=\"deck\">\n\n<!-- ═══════════════════════════════════════════════════════\n     S0: TITLE\n     ═══════════════════════════════════════════════════════ -->\n<div class=\"slide on\" id=\"s0\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Security Champions<\u002Fspan> · Program<\u002Fspan><div class=\"pips\" id=\"pp0\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"fbody\">\n    <div class=\"fb-content\">\n      <div class=\"fb-tg\">Security Champions Program<\u002Fdiv>\n      <div class=\"fb-tt\">Making the Security Champion<\u002Fdiv>\n      <div class=\"fb-sb\">A self-paced introduction to the Security Champion role — why it exists, what it takes, and how to launch the program in your organization.<\u002Fdiv>\n      <div class=\"fb-sb\" style=\"font-size:13px;color:rgba(255,255,255,.55);margin-top:10px;font-style:italic\">Take your time. Pause to reflect when prompted, revisit slides, and discuss what resonates with your team — this is meant for thinking, not racing.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"fb-visual\"><svg viewBox=\"0 0 120 120\" width=\"230\" height=\"230\"><g class=\"hex-pulse-ring\"><polygon points=\"60,10 100,30 100,70 60,110 20,70 20,30\" fill=\"none\" stroke=\"rgba(232,129,58,.15)\" stroke-width=\"1\"><\u002Fpolygon><\u002Fg><g class=\"hex-orbit\"><polygon points=\"60,18 92,36 92,72 60,90 28,72 28,36\" fill=\"none\" stroke=\"rgba(232,129,58,.1)\" stroke-width=\"0.5\" stroke-dasharray=\"4,4\"><\u002Fpolygon><\u002Fg><g class=\"shield-icon\"><polygon points=\"60,25 88,40 88,68 60,85 32,68 32,40\" fill=\"none\" stroke=\"var(--or)\" stroke-width=\"2.5\"><\u002Fpolygon><polygon points=\"60,35 78,45 78,63 60,73 42,63 42,45\" fill=\"rgba(232,129,58,.08)\" stroke=\"var(--or)\" stroke-width=\"1\" opacity=\".6\"><\u002Fpolygon><path d=\"M52,54 L58,60 L70,46\" fill=\"none\" stroke=\"var(--or)\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fg><\u002Fsvg><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">01 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn pri\" onclick=\"go(1)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S1: WHO IS RESPONSIBLE — quiz -->\n<div class=\"slide\" id=\"s1\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Act 1<\u002Fspan> · Who owns security?<\u002Fspan><div class=\"pips\" id=\"pp1\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"split\"><div class=\"sp-l\"><div class=\"sp-t\">Who is responsible for security?<\u002Fdiv><\u002Fdiv><div class=\"sp-r\">\n    <div class=\"prose\">Before we get into the program, consider this question. When something goes wrong — a breach, a vulnerability in production, a leaked API key — who is responsible?<\u002Fdiv>\n    <div class=\"prose\">Most people give one of two answers: \"DevOps, mostly\" or \"Everyone, because security is only as strong as the weakest link.\" Both contain truth, but both miss something important.<\u002Fdiv>\n    <div class=\"qw\" id=\"q1\"><div class=\"qq\">Who is ultimately responsible for the security of your product?<\u002Fdiv><button class=\"qo\" onclick=\"pk('q1',0)\">A) Developers — they write the code<\u002Fbutton><button class=\"qo\" onclick=\"pk('q1',1)\">B) DevOps — they control infrastructure<\u002Fbutton><button class=\"qo\" onclick=\"pk('q1',2)\">C) The security team — it is their domain<\u002Fbutton><button class=\"qo\" onclick=\"pk('q1',3)\">D) The business — distributed across all roles<\u002Fbutton><div class=\"qe\" id=\"q1-e\"><strong>D.<\u002Fstrong> Security is a business function — owned by the organization and distributed across every role. Developers, DevOps, architects, managers, and the CIO all participate. The question is not who is responsible, but how each role contributes.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">02 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(0)\">← Back<\u002Fbutton><button class=\"btn pri\" onclick=\"go(2)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S2: OLD MODEL BROKEN -->\n<div class=\"slide\" id=\"s2\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Act 1<\u002Fspan> · Who owns security?<\u002Fspan><div class=\"pips\" id=\"pp2\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"split\"><div class=\"sp-l\"><div class=\"sp-t\">The old model is broken<\u002Fdiv><\u002Fdiv><div class=\"sp-r\">\n    <div class=\"prose\">There is a well-known phrase: <strong>\"Security equals the weakest part of the chain.\"<\u002Fstrong> For a long time, this was useful. Secure the perimeter — the firewall, the network boundary — and the weakest link was the thing to worry about.<\u002Fdiv>\n    <div class=\"prose\">The problem: modern products do not have one chain. They have dozens. Open-source libraries, public registries, cloud templates, third-party auth providers. Each is a separate supply chain, controlled by a different role.<\u002Fdiv>\n    <div class=\"xp\" id=\"x2a\"><button class=\"xh\" onclick=\"tg('x2a')\"><span>What \"supply chains\" look like in a typical project<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x2a-p\">A single API endpoint: code by a developer, framework by an OSS community, container by DevOps, cloud infra by a platform team, auth by a third-party provider. A vulnerability in any layer is your vulnerability — but no single person controls all of them.<\u002Fdiv><\u002Fdiv>\n    <div class=\"xp\" id=\"x2b\"><button class=\"xh\" onclick=\"tg('x2b')\"><span>Why \"everyone is responsible\" is not enough<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x2b-p\">Technically correct but practically useless. Without structure defining how each role participates — developers, DevOps, architects, managers, and the CIO — shared responsibility becomes no responsibility. The Champions program gives that structure a concrete shape.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">03 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(1)\">← Back<\u002Fbutton><button class=\"btn pri\" onclick=\"go(3)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S3: WHAT SECURITY MEANS -->\n<div class=\"slide\" id=\"s3\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Act 1<\u002Fspan> · Who owns security?<\u002Fspan><div class=\"pips\" id=\"pp3\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"split\"><div class=\"sp-l\"><div class=\"sp-t\">What security actually means<\u002Fdiv><\u002Fdiv><div class=\"sp-r\">\n    <div class=\"prose\">Security is the state of protection against threats — both external and internal — that allows the business to continue operating and making money efficiently. That definition is deliberately broad: information security, physical security, financial security, operational continuity.<\u002Fdiv>\n    <div class=\"prose\">The point: security is not about protecting technology for its own sake. It is about enabling the business to sustain its operations. A security control that protects the app but blocks the team from releasing is a trade-off, not a net positive.<\u002Fdiv>\n    <div class=\"xp\" id=\"x3a\"><button class=\"xh\" onclick=\"tg('x3a')\"><span>Why this definition changes your priorities<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x3a-p\">When security is \"protecting the business,\" every decision becomes cost-benefit. A vulnerability in a test environment differs from one in a payment flow. A slow security review that delays a release has a real cost. This is not carelessness — it is precision.<\u002Fdiv><\u002Fdiv>\n    <div class=\"xp\" id=\"x3b\"><button class=\"xh\" onclick=\"tg('x3b')\"><span>Security is not just an IT concern<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x3b-p\">The instructor is deliberate: this definition encompasses physical security (office access, hardware), financial security (fraud prevention, payment integrity), informational security (data protection, privacy), and operational continuity. A Security Champion thinks about all of these — not just code vulnerabilities.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">04 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(2)\">← Back<\u002Fbutton><button class=\"btn pri\" onclick=\"go(4)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S4: DEVELOPER'S DAY -->\n<div class=\"slide\" id=\"s4\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Act 1<\u002Fspan> · Who owns security?<\u002Fspan><div class=\"pips\" id=\"pp4\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"split\"><div class=\"sp-l\"><div class=\"sp-t\">The developer's day is already full<\u002Fdiv><\u002Fdiv><div class=\"sp-r\">\n    <div class=\"prose\">Nobody disputes that security matters. The real question: how do you implement it without slowing everything else down?<\u002Fdiv>\n    <div class=\"prose\">A typical day: multiple frameworks, Agile workflows, product deadlines, bug fixes, cross-functional requirements, DevOps communication, and daily releases. Half-year release cycles are becoming rare. Time is the most expensive resource, and anything without clear value gets deprioritized.<\u002Fdiv>\n    <div class=\"prose\">This is a structural reality, not a complaint. The development process has compressed so much that bolting security on top creates friction the business will eventually override.<\u002Fdiv>\n    <div class=\"xp\" id=\"x4a\"><button class=\"xh\" onclick=\"tg('x4a')\"><span>Why release velocity matters for security<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x4a-p\">Faster releases mean smaller diffs — in theory, easier to review. But less time between releases for thorough analysis. The challenge is building security into the speed, not adding it as a checkpoint outside the pipeline.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">05 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(3)\">← Back<\u002Fbutton><button class=\"btn pri\" onclick=\"go(5)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S5: BREATHER — TETRIS -->\n<div class=\"slide\" id=\"s5\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Time to think<\u002Fspan> · The developer's day<\u002Fspan><div class=\"pips\" id=\"pp5\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"breather bg-warm\">\n    <div class=\"breather-visual\"><div class=\"scene\" data-loop=\"8.5s\" style=\"--loop:8.5s\"><div class=\"scene-tools\"><button class=\"scene-btn\" data-act=\"pause\">⏸ Pause<\u002Fbutton><button class=\"scene-btn\" data-act=\"replay\">↻ Replay<\u002Fbutton><\u002Fdiv><div class=\"scene-stage\"><div class=\"tetris-box\">\n      <div class=\"t-block a1\">Sprint planning<\u002Fdiv><div class=\"t-block a2\">Code review<\u002Fdiv><div class=\"t-block a3\">Bug fix<\u002Fdiv><div class=\"t-block a4\">Daily standup<\u002Fdiv>\n      <div class=\"t-block a5\">Feature dev<\u002Fdiv><div class=\"t-block a6\">Deploy<\u002Fdiv><div class=\"t-block a7\">Hotfix prod<\u002Fdiv><div class=\"t-block a8\">PR feedback<\u002Fdiv>\n      <div class=\"t-block a9 sc\">Agile retro<\u002Fdiv><div class=\"t-block a10 sc\">Testing<\u002Fdiv><div class=\"t-block a11 sc\">Docs update<\u002Fdiv><div class=\"t-block a12 sc\">Slack msgs<\u002Fdiv>\n      <div class=\"t-block a13 sc\">CI pipeline<\u002Fdiv><div class=\"t-block a14 sc\">Dependency bump<\u002Fdiv><div class=\"t-block a15 sc\">Meetings<\u002Fdiv>\n      <div class=\"t-sec\">🔒 SECURITY CHAMPION DUTIES<\u002Fdiv>\n      <div class=\"t-go\">GAME OVER<\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv><div class=\"scene-loop\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"breather-caption\"><p>A developer's day is already full. Add <strong>SECURITY CHAMPION DUTIES<\u002Fstrong> on top — and everything crashes.<br>The solution? Make it a <strong>hybrid role<\u002Fstrong>, not extra work.<\u002Fp>\n    <div class=\"breather-notice\">Did you notice — <b>the security block is heavier<\u002Fb> than the others, and arrives last?<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">Time to think and reflect<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(4)\">← Back<\u002Fbutton><button class=\"btn reflect-btn\" onclick=\"openReflect('oversight')\">⏸ Reflect<\u002Fbutton><button class=\"btn pri\" onclick=\"go(6)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S6: ONBOARDING PROBLEM -->\n<div class=\"slide\" id=\"s6\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Act 1<\u002Fspan> · Who owns security?<\u002Fspan><div class=\"pips\" id=\"pp6\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"split\"><div class=\"sp-l\"><div class=\"sp-t\">The onboarding problem<\u002Fdiv><\u002Fdiv><div class=\"sp-r\">\n    <div class=\"prose\">When a new security specialist joins a product team, they face a steep learning curve. Dependencies, pipelines, cloud configs, key vaults, library choices, internal conventions — it takes months.<\u002Fdiv>\n    <div class=\"prose\">Research shows this deep onboarding is no longer economically efficient. The specialist brings expertise but lacks product context. By the time they understand the system, the system has already changed.<\u002Fdiv>\n    <div class=\"xp\" id=\"x5a\"><button class=\"xh\" onclick=\"tg('x5a')\"><span>The economics of external onboarding<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x5a-p\">A specialist takes 2–3 months to become effective. If shared across products, the onboarding repeats. Across dozens of teams, the model breaks — the cost of context acquisition exceeds the value of the expertise.<\u002Fdiv><\u002Fdiv>\n    <div class=\"xp\" id=\"x5b\"><button class=\"xh\" onclick=\"tg('x5b')\"><span>The silo problem<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x5b-p\">Developers own one service. If a vulnerability spans a neighbor — common in distributed architectures — they must understand dependencies across boundaries they don't normally work with. This is slow and error-prone.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">07 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(5)\">← Back<\u002Fbutton><button class=\"btn pri\" onclick=\"go(7)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S7: PEOPLE PROCESS TECH -->\n<div class=\"slide\" id=\"s7\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Act 1<\u002Fspan> · Who owns security?<\u002Fspan><div class=\"pips\" id=\"pp7\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"split\"><div class=\"sp-l\"><div class=\"sp-t\">People, process, technology<\u002Fdiv><\u002Fdiv><div class=\"sp-r\">\n    <div class=\"prose\">Every system has three components: people, process, and technology. Tools scan for known vulnerabilities. Processes ensure steps are followed. But both have limits.<\u002Fdiv>\n    <div class=\"prose\">Technology catches known patterns. Process without understanding becomes checkbox exercise. When both reach their limits, the remaining variable is people — people who understand both security and the product well enough to make judgment calls that tools cannot.<\u002Fdiv>\n    <div class=\"prose\">This is the gap the Security Champion role is designed to fill.<\u002Fdiv>\n    <div class=\"xp\" id=\"x6a\"><button class=\"xh\" onclick=\"tg('x6a')\"><span>Why automation does not solve everything<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x6a-p\">Scanners produce false positives, miss business-logic vulnerabilities, and cannot evaluate whether a risk is acceptable in context. A scanner flags a SQL injection pattern but cannot tell you if the input is user-controlled or hardcoded. That judgment requires someone who understands the code.<\u002Fdiv><\u002Fdiv>\n    <div class=\"xp\" id=\"x6b\"><button class=\"xh\" onclick=\"tg('x6b')\"><span>How the Champion fills the people gap<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x6b-p\">A Champion is someone who can look at a scanner report and say: \"These three are false positives because of how our auth middleware works, but this one is real — the endpoint accepts unsanitized input from a query param.\" That single sentence saves the team hours. It requires both security knowledge and product context — and that combination is exactly what makes a Champion effective.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">08 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(6)\">← Back<\u002Fbutton><button class=\"btn pri\" onclick=\"go(8)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S8: SECTION — THE CHAMPION -->\n<div class=\"slide\" id=\"s8\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Part 2<\u002Fspan><\u002Fspan><div class=\"pips\" id=\"pp8\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"fbody\">\n    <div class=\"fb-content\">\n      <div class=\"fb-tg\">Part 2<\u002Fdiv>\n      <div class=\"fb-tt\">The Security Champion<\u002Fdiv>\n      <div class=\"fb-sb\">Instead of parachuting a specialist into every team, embed security awareness in someone who already knows the product.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"fb-visual\"><svg viewBox=\"0 0 100 120\" width=\"220\" height=\"240\"><g class=\"person-group\"><circle cx=\"50\" cy=\"35\" r=\"12\" fill=\"none\" stroke=\"rgba(255,255,255,.6)\" stroke-width=\"1.5\"><\u002Fcircle><path d=\"M30,90 Q30,55 50,52 Q70,55 70,90\" fill=\"none\" stroke=\"rgba(255,255,255,.6)\" stroke-width=\"1.5\"><\u002Fpath><\u002Fg><g class=\"orbit-shield\"><g class=\"orbit-shield-glow\"><path d=\"M-8,-10 L0,-14 L8,-10 L8,2 L0,8 L-8,2 Z\" fill=\"var(--or)\" opacity=\".8\" transform=\"translate(50,60)\"><\u002Fpath><path d=\"M-3,-2 L0,2 L5,-4\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.5\" stroke-linecap=\"round\" transform=\"translate(50,60)\"><\u002Fpath><\u002Fg><\u002Fg><circle cx=\"20\" cy=\"100\" r=\"2\" fill=\"rgba(232,129,58,.3)\"><\u002Fcircle><circle cx=\"50\" cy=\"105\" r=\"2\" fill=\"rgba(232,129,58,.3)\"><\u002Fcircle><circle cx=\"80\" cy=\"100\" r=\"2\" fill=\"rgba(232,129,58,.3)\"><\u002Fcircle><line x1=\"20\" y1=\"100\" x2=\"50\" y2=\"105\" stroke=\"rgba(232,129,58,.15)\" stroke-width=\".5\"><\u002Fline><line x1=\"50\" y1=\"105\" x2=\"80\" y2=\"100\" stroke=\"rgba(232,129,58,.15)\" stroke-width=\".5\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">09 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(7)\">← Back<\u002Fbutton><button class=\"btn reflect-btn\" onclick=\"openReflect('champion')\">⏸ Reflect<\u002Fbutton><button class=\"btn pri\" onclick=\"go(9)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S9: KNOWLEDGE CHECK 1 -->\n<div class=\"slide\" id=\"s9\">\n  <div class=\"sh\"><span class=\"stag\">Knowledge check · Act 1 reflection<\u002Fspan><div class=\"pips\" id=\"pp9\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"split\"><div class=\"sp-l\"><div class=\"sp-t\">Knowledge check<\u002Fdiv><div class=\"sp-s\">Reflect on Act 1<\u002Fdiv><\u002Fdiv><div class=\"sp-r\">\n    <div class=\"qw\" id=\"q2\"><div class=\"qq\">A new engineer must learn all security dependencies before contributing. What is the core problem?<\u002Fdiv><button class=\"qo\" onclick=\"pk('q2',0)\">A) They lack technical skills<\u002Fbutton><button class=\"qo\" onclick=\"pk('q2',1)\">B) Time and cost of security onboarding is no longer efficient at scale<\u002Fbutton><button class=\"qo\" onclick=\"pk('q2',2)\">C) Security documentation is always outdated<\u002Fbutton><button class=\"qo\" onclick=\"pk('q2',3)\">D) Management doesn't allocate time<\u002Fbutton><div class=\"qe\" id=\"q2-e\"><strong>B.<\u002Fstrong> The problem is economic. With daily releases, learning dependencies from scratch is prohibitively expensive. The efficient approach: embed security knowledge through someone who already knows the product — someone who has already paid the context acquisition cost.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">10 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(8)\">← Back<\u002Fbutton><button class=\"btn pri\" onclick=\"go(10)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S10: WHAT IS A SC -->\n<div class=\"slide\" id=\"s10\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Act 2<\u002Fspan> · The Champion<\u002Fspan><div class=\"pips\" id=\"pp10\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"split\"><div class=\"sp-l\"><div class=\"sp-t\">What a Security Champion actually is<\u002Fdiv><\u002Fdiv><div class=\"sp-r\">\n    <div class=\"prose\">A Security Champion is not a developer with extra work bolted on. It is a person whose role is to help developers write more secure code, faster. The emphasis on \"faster\" matters — this is about removing friction, not adding it.<\u002Fdiv>\n    <div class=\"prose\">The core idea: instead of a specialist who needs months to learn your product, take someone who already knows the codebase, the pipeline, and the team — and give them a security focus. <strong>Developers should develop.<\u002Fstrong> The Champion makes that development more secure without turning developers into security experts.<\u002Fdiv>\n    <div class=\"xp\" id=\"x9a\"><button class=\"xh\" onclick=\"tg('x9a')\"><span class=\"xi\">💬<\u002Fspan><span>From a security specialist — on why this works<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x9a-p\"><div class=\"xb-q\">\"I understand your technology stack. But your product kitchen — the specific terms, the internal processes, the things your team just knows — would take me months to learn. That's why the best Security Champion is a colleague from inside the product.\"<\u002Fdiv><div class=\"xb-n\">Deep product context is hard to acquire from outside — and it is exactly what makes a Champion effective from day one.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"xp\" id=\"x9b\"><button class=\"xh\" onclick=\"tg('x9b')\"><span>What \"faster\" actually means here<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x9b-p\">When a developer hits a security question during code review, the Champion answers in minutes, not days. When a feature is being designed, the Champion raises security considerations in the design discussion — not in a separate review two weeks later. Speed is part of the value proposition.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">11 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(9)\">← Back<\u002Fbutton><button class=\"btn pri\" onclick=\"go(11)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S11: BREATHER — KITCHEN -->\n<div class=\"slide\" id=\"s11\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Time to think<\u002Fspan> · Why insiders win<\u002Fspan><div class=\"pips\" id=\"pp11\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"breather bg-earth\">\n    <div class=\"breather-visual\"><div class=\"scene\" data-loop=\"12s\" style=\"--loop:12s\"><div class=\"scene-tools\"><button class=\"scene-btn\" data-act=\"pause\">⏸ Pause<\u002Fbutton><button class=\"scene-btn\" data-act=\"replay\">↻ Replay<\u002Fbutton><\u002Fdiv><div class=\"scene-stage\"><div class=\"kitchen-box\">\n      <div class=\"k-wall\"><\u002Fdiv><div class=\"k-counter\"><\u002Fdiv><div class=\"k-floor\"><\u002Fdiv><div class=\"k-shelf\"><\u002Fdiv>\n      <div class=\"k-bracket kb1\"><\u002Fdiv><div class=\"k-bracket kb2\"><\u002Fdiv><div class=\"k-bracket kb3\"><\u002Fdiv>\n      <div class=\"k-jar kj1\"><svg viewBox=\"0 0 18 20\"><rect x=\"3\" y=\"6\" width=\"12\" height=\"14\" rx=\"2\" fill=\"rgba(200,180,150,.1)\"><\u002Frect><rect x=\"5\" y=\"3\" width=\"8\" height=\"4\" rx=\"1\" fill=\"rgba(200,180,150,.08)\"><\u002Frect><\u002Fsvg><\u002Fdiv>\n      <div class=\"k-jar kj2\"><svg viewBox=\"0 0 18 20\"><rect x=\"4\" y=\"4\" width=\"10\" height=\"16\" rx=\"2\" fill=\"rgba(180,200,180,.08)\"><\u002Frect><\u002Fsvg><\u002Fdiv>\n      <div class=\"k-jar kj3\"><svg viewBox=\"0 0 18 20\"><rect x=\"3\" y=\"6\" width=\"12\" height=\"14\" rx=\"2\" fill=\"rgba(200,180,150,.1)\"><\u002Frect><\u002Fsvg><\u002Fdiv>\n      <div class=\"k-cab k-c1\"><div class=\"knob\"><\u002Fdiv><div class=\"k-cab-label\">env vars<\u002Fdiv><\u002Fdiv>\n      <div class=\"k-cab k-c2\"><div class=\"knob\"><\u002Fdiv><div class=\"k-cab-label\">secrets<\u002Fdiv><\u002Fdiv>\n      <div class=\"k-cab k-c3\"><div class=\"knob\"><\u002Fdiv><div class=\"k-cab-label\">configs<\u002Fdiv><\u002Fdiv>\n      <div class=\"k-pot p1\"><svg viewBox=\"0 0 44 40\"><rect x=\"4\" y=\"18\" width=\"36\" height=\"20\" rx=\"3\" fill=\"rgba(180,170,155,.15)\"><\u002Frect><rect x=\"2\" y=\"16\" width=\"40\" height=\"4\" rx=\"2\" fill=\"rgba(180,170,155,.2)\"><\u002Frect><rect x=\"16\" y=\"8\" width=\"12\" height=\"3\" rx=\"1.5\" fill=\"rgba(180,170,155,.18)\"><\u002Frect><ellipse cx=\"22\" cy=\"16\" rx=\"16\" ry=\"2\" fill=\"rgba(180,170,155,.12)\"><\u002Fellipse><\u002Fsvg><div class=\"k-pot-label\">auth service<\u002Fdiv><div class=\"steam\" style=\"left:18px;top:-8px\"><\u002Fdiv><div class=\"steam\" style=\"left:34px;top:-12px;animation-delay:.5s\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"k-pot p2\"><svg viewBox=\"0 0 44 40\"><rect x=\"4\" y=\"18\" width=\"36\" height=\"20\" rx=\"3\" fill=\"rgba(180,170,155,.15)\"><\u002Frect><rect x=\"2\" y=\"16\" width=\"40\" height=\"4\" rx=\"2\" fill=\"rgba(180,170,155,.2)\"><\u002Frect><rect x=\"16\" y=\"8\" width=\"12\" height=\"3\" rx=\"1.5\" fill=\"rgba(180,170,155,.18)\"><\u002Frect><ellipse cx=\"22\" cy=\"16\" rx=\"16\" ry=\"2\" fill=\"rgba(180,170,155,.12)\"><\u002Fellipse><\u002Fsvg><div class=\"k-pot-label\">payments<\u002Fdiv><div class=\"steam\" style=\"left:20px;top:-7px;animation-delay:.3s\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"k-pot p3\"><svg viewBox=\"0 0 44 40\"><rect x=\"4\" y=\"18\" width=\"36\" height=\"20\" rx=\"3\" fill=\"rgba(180,170,155,.15)\"><\u002Frect><rect x=\"2\" y=\"16\" width=\"40\" height=\"4\" rx=\"2\" fill=\"rgba(180,170,155,.2)\"><\u002Frect><rect x=\"16\" y=\"8\" width=\"12\" height=\"3\" rx=\"1.5\" fill=\"rgba(180,170,155,.18)\"><\u002Frect><ellipse cx=\"22\" cy=\"16\" rx=\"16\" ry=\"2\" fill=\"rgba(180,170,155,.12)\"><\u002Fellipse><\u002Fsvg><div class=\"k-pot-label\">user data<\u002Fdiv><div class=\"steam\" style=\"left:22px;top:-8px;animation-delay:.6s\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"k-plabel\">outside specialist<\u002Fdiv>\n      <div class=\"k-person-wrap\"><span class=\"k-bob\"><svg viewBox=\"0 0 34 58\" width=\"34\" height=\"58\"><ellipse cx=\"17\" cy=\"3\" rx=\"9\" ry=\"4\" fill=\"#F5F2ED\"><\u002Fellipse><rect x=\"8\" y=\"2\" width=\"18\" height=\"16\" rx=\"4\" fill=\"#F0EDE8\"><\u002Frect><ellipse cx=\"12\" cy=\"4\" rx=\"4\" ry=\"3\" fill=\"#F5F2ED\"><\u002Fellipse><ellipse cx=\"22\" cy=\"4\" rx=\"4\" ry=\"3\" fill=\"#F5F2ED\"><\u002Fellipse><ellipse cx=\"17\" cy=\"3\" rx=\"5\" ry=\"3.5\" fill=\"#F8F5F0\"><\u002Fellipse><rect x=\"6\" y=\"16\" width=\"22\" height=\"4\" rx=\"1\" fill=\"#E0DCD6\"><\u002Frect><circle cx=\"17\" cy=\"26\" r=\"7\" fill=\"rgba(255,255,255,.55)\"><\u002Fcircle><circle cx=\"14\" cy=\"25.5\" r=\"1.5\" fill=\"#333\"><\u002Fcircle><circle cx=\"20\" cy=\"25.5\" r=\"1.5\" fill=\"#333\"><\u002Fcircle><rect x=\"10\" y=\"33\" width=\"14\" height=\"14\" rx=\"3\" fill=\"rgba(255,255,255,.35)\"><\u002Frect><rect x=\"11\" y=\"46\" width=\"5\" height=\"10\" rx=\"2\" fill=\"rgba(255,255,255,.25)\"><\u002Frect><rect x=\"18\" y=\"46\" width=\"5\" height=\"10\" rx=\"2\" fill=\"rgba(255,255,255,.25)\"><\u002Frect><\u002Fsvg><\u002Fspan><\u002Fdiv>\n      <div class=\"k-thought\" style=\"left:54%\">where's our auth lib?<\u002Fdiv>\n      <div class=\"k-thought k-th2\" style=\"left:8%\">which secrets vault?<\u002Fdiv>\n      <div class=\"k-thought k-th3\" style=\"left:32%\">who owns this service?<\u002Fdiv>\n      <div class=\"k-insider\"><div class=\"k-insider-label\">teammate · knows the kitchen<\u002Fdiv><div class=\"k-insider-shield\"><svg width=\"18\" height=\"20\" viewBox=\"0 0 18 20\"><path d=\"M9,1 L16,4 L16,12 L9,18 L2,12 L2,4 Z\" fill=\"var(--gr)\"><\u002Fpath><path d=\"M6,10 L8,12 L12,7\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><svg viewBox=\"0 0 34 58\" width=\"34\" height=\"58\"><ellipse cx=\"17\" cy=\"3\" rx=\"9\" ry=\"4\" fill=\"#3a3a3a\"><\u002Fellipse><rect x=\"8\" y=\"2\" width=\"18\" height=\"16\" rx=\"4\" fill=\"#2e2e2e\"><\u002Frect><circle cx=\"17\" cy=\"9\" r=\"6\" fill=\"#E8B898\"><\u002Fcircle><circle cx=\"14.5\" cy=\"9\" r=\"1\" fill=\"#333\"><\u002Fcircle><circle cx=\"19.5\" cy=\"9\" r=\"1\" fill=\"#333\"><\u002Fcircle><rect x=\"6\" y=\"16\" width=\"22\" height=\"4\" rx=\"1\" fill=\"#1f1f1f\"><\u002Frect><rect x=\"8\" y=\"20\" width=\"18\" height=\"18\" rx=\"3\" fill=\"rgba(46,173,107,.65)\"><\u002Frect><rect x=\"9\" y=\"38\" width=\"6\" height=\"12\" rx=\"2\" fill=\"#3a3a3a\"><\u002Frect><rect x=\"19\" y=\"38\" width=\"6\" height=\"12\" rx=\"2\" fill=\"#3a3a3a\"><\u002Frect><\u002Fsvg><\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv><div class=\"scene-loop\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"breather-caption\"><p>An outside specialist wanders the <strong>\"product kitchen\"<\u002Fstrong> — knows the recipe, can't find the salt.<br>The <strong>teammate inside<\u002Fstrong> already knows where everything lives.<\u002Fp>\n    <div class=\"breather-notice\">Did you notice — <b>the cabinets stay open<\u002Fb>? The specialist never thinks to check inside.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">Time to think and reflect<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(10)\">← Back<\u002Fbutton><button class=\"btn reflect-btn\" onclick=\"openReflect('apprentice')\">⏸ Reflect<\u002Fbutton><button class=\"btn pri\" onclick=\"go(12)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S12: WHO QUALIFIES -->\n<div class=\"slide\" id=\"s12\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Act 2<\u002Fspan> · The Champion<\u002Fspan><div class=\"pips\" id=\"pp12\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"split\"><div class=\"sp-l\"><div class=\"sp-t\">Who can be a Champion?<\u002Fdiv><\u002Fdiv><div class=\"sp-r\">\n    <div class=\"prose\">The criteria are simpler than expected. A Champion needs two things: an interest in security, and a solid understanding of the current product, stack, and processes. That is the entire list.<\u002Fdiv>\n    <div class=\"prose\">A mid-level developer on the project for six months and curious about security is a stronger candidate than a senior architect who joined last week. Product context is the hard-to-acquire asset — security knowledge can be taught. The reverse is much harder.<\u002Fdiv>\n    <div class=\"xp\" id=\"x10a\"><button class=\"xh\" onclick=\"tg('x10a')\"><span>Can a junior developer be a Champion?<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x10a-p\">Yes — if they have genuine interest and have been on the project long enough. The program provides training; what cannot be taught is curiosity and product familiarity. A junior shipping features for eight months knows things a senior hire will take weeks to discover.<\u002Fdiv><\u002Fdiv>\n    <div class=\"xp\" id=\"x10b\"><button class=\"xh\" onclick=\"tg('x10b')\"><span>What if nobody on the team is interested?<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x10b-p\">Champions must be volunteers, not conscripts. Someone assigned without interest will deprioritize under deadline pressure. If nobody is interested, investigate why — usually a perception problem (\"security is boring\") rather than a lack of candidates.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">13 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(11)\">← Back<\u002Fbutton><button class=\"btn pri\" onclick=\"go(13)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S13: BREATHER — PARACHUTE -->\n<div class=\"slide\" id=\"s13\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Time to think<\u002Fspan> · Why insiders win<\u002Fspan><div class=\"pips\" id=\"pp13\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"breather bg-navy\">\n    <div class=\"breather-visual\"><div class=\"scene\" data-loop=\"12s\" style=\"--loop:12s\"><div class=\"scene-tools\"><button class=\"scene-btn\" data-act=\"pause\">⏸ Pause<\u002Fbutton><button class=\"scene-btn\" data-act=\"replay\">↻ Replay<\u002Fbutton><\u002Fdiv><div class=\"scene-stage\"><div class=\"para-box\">\n      <div class=\"p-ground\"><\u002Fdiv><div class=\"p-ground-label\">your product team<\u002Fdiv>\n      <div class=\"ptm pt1\"><svg viewBox=\"0 0 28 42\"><circle class=\"phead\" cx=\"14\" cy=\"9\" r=\"6\"><\u002Fcircle><rect class=\"pbody\" x=\"6\" y=\"16\" width=\"16\" height=\"14\" rx=\"3\"><\u002Frect><rect class=\"pleg\" x=\"7\" y=\"29\" width=\"5\" height=\"10\" rx=\"2\"><\u002Frect><rect class=\"pleg\" x=\"16\" y=\"29\" width=\"5\" height=\"10\" rx=\"2\"><\u002Frect><\u002Fsvg><\u002Fdiv>\n      <div class=\"ptm pt2\"><svg viewBox=\"0 0 28 42\"><circle class=\"phead\" cx=\"14\" cy=\"9\" r=\"6\"><\u002Fcircle><rect class=\"pbody\" x=\"6\" y=\"16\" width=\"16\" height=\"14\" rx=\"3\"><\u002Frect><rect class=\"pleg\" x=\"7\" y=\"29\" width=\"5\" height=\"10\" rx=\"2\"><\u002Frect><rect class=\"pleg\" x=\"16\" y=\"29\" width=\"5\" height=\"10\" rx=\"2\"><\u002Frect><\u002Fsvg><\u002Fdiv>\n      <div class=\"ptm pt3\"><svg viewBox=\"0 0 28 42\"><circle cx=\"14\" cy=\"9\" r=\"6\" fill=\"#A0B0C0\"><\u002Fcircle><rect x=\"6\" y=\"16\" width=\"16\" height=\"14\" rx=\"3\" fill=\"#8A9AAA\"><\u002Frect><rect x=\"7\" y=\"29\" width=\"5\" height=\"10\" rx=\"2\" fill=\"#7A8A9A\"><\u002Frect><rect x=\"16\" y=\"29\" width=\"5\" height=\"10\" rx=\"2\" fill=\"#7A8A9A\"><\u002Frect><\u002Fsvg><\u002Fdiv>\n      <div class=\"ptm pt4\"><svg viewBox=\"0 0 28 42\"><circle class=\"phead\" cx=\"14\" cy=\"9\" r=\"6\"><\u002Fcircle><rect class=\"pbody\" x=\"6\" y=\"16\" width=\"16\" height=\"14\" rx=\"3\"><\u002Frect><rect class=\"pleg\" x=\"7\" y=\"29\" width=\"5\" height=\"10\" rx=\"2\"><\u002Frect><rect class=\"pleg\" x=\"16\" y=\"29\" width=\"5\" height=\"10\" rx=\"2\"><\u002Frect><\u002Fsvg><\u002Fdiv>\n      <div class=\"ptm pt5\"><svg viewBox=\"0 0 28 42\"><circle class=\"phead\" cx=\"14\" cy=\"9\" r=\"6\"><\u002Fcircle><rect class=\"pbody\" x=\"6\" y=\"16\" width=\"16\" height=\"14\" rx=\"3\"><\u002Frect><rect class=\"pleg\" x=\"7\" y=\"29\" width=\"5\" height=\"10\" rx=\"2\"><\u002Frect><rect class=\"pleg\" x=\"16\" y=\"29\" width=\"5\" height=\"10\" rx=\"2\"><\u002Frect><\u002Fsvg><\u002Fdiv>\n      <div class=\"pt3-scan\"><\u002Fdiv>\n      <svg class=\"pt3-shield\" width=\"22\" height=\"24\" viewBox=\"0 0 22 24\"><path d=\"M11,1 L20,6 L20,15 L11,22 L2,15 L2,6 Z\" fill=\"var(--or)\" opacity=\".9\"><\u002Fpath><path d=\"M7,12 L10,15 L15,9\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n      <div class=\"pt3-label\">insider → champion<\u002Fdiv>\n      <svg style=\"position:absolute;top:0;left:0;width:100%;height:100%\"><line class=\"pconn\" x1=\"46%\" y1=\"105\" x2=\"16%\" y2=\"105\"><\u002Fline><line class=\"pconn\" x1=\"46%\" y1=\"105\" x2=\"31%\" y2=\"105\"><\u002Fline><line class=\"pconn\" x1=\"46%\" y1=\"105\" x2=\"61%\" y2=\"105\"><\u002Fline><line class=\"pconn\" x1=\"46%\" y1=\"105\" x2=\"78%\" y2=\"105\"><\u002Fline><\u002Fsvg>\n      <div class=\"para-group\"><svg class=\"para-canopy\" width=\"50\" height=\"35\" viewBox=\"0 0 50 35\" style=\"display:block;margin:0 auto\"><path d=\"M4,30 Q8,0 25,0 Q42,0 46,30\" fill=\"rgba(217,69,69,.12)\" stroke=\"var(--rd)\" stroke-width=\"1.2\" opacity=\".7\"><\u002Fpath><line x1=\"4\" y1=\"30\" x2=\"20\" y2=\"44\" stroke=\"var(--rd)\" stroke-width=\".6\" opacity=\".4\"><\u002Fline><line x1=\"46\" y1=\"30\" x2=\"30\" y2=\"44\" stroke=\"var(--rd)\" stroke-width=\".6\" opacity=\".4\"><\u002Fline><\u002Fsvg><svg width=\"26\" height=\"40\" viewBox=\"0 0 26 40\" style=\"display:block;margin:0 auto\"><circle cx=\"13\" cy=\"9\" r=\"6\" fill=\"#AA7070\"><\u002Fcircle><rect x=\"5\" y=\"16\" width=\"16\" height=\"14\" rx=\"3\" fill=\"#996060\"><\u002Frect><rect x=\"6\" y=\"29\" width=\"5\" height=\"9\" rx=\"2\" fill=\"#885555\"><\u002Frect><rect x=\"15\" y=\"29\" width=\"5\" height=\"9\" rx=\"2\" fill=\"#885555\"><\u002Frect><\u002Fsvg><div class=\"para-q\">?<\u002Fdiv><div class=\"para-ext-label\">external specialist<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv><div class=\"scene-loop\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"breather-caption\"><p>The external specialist parachutes in — confused.<br>Meanwhile, <strong>someone already on the team<\u002Fstrong> gets the shield.<\u002Fp>\n    <div class=\"breather-notice\">Did you notice — <b>the connection lines<\u002Fb>? The insider already has trust paths to the whole team.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">Time to think and reflect<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(12)\">← Back<\u002Fbutton><button class=\"btn reflect-btn\" onclick=\"openReflect('threat')\">⏸ Reflect<\u002Fbutton><button class=\"btn pri\" onclick=\"go(14)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S14: HYBRID -->\n<div class=\"slide\" id=\"s14\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Act 2<\u002Fspan> · The Champion<\u002Fspan><div class=\"pips\" id=\"pp14\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"split\"><div class=\"sp-l\"><div class=\"sp-t\">Hybrid, not full-time<\u002Fdiv><\u002Fdiv><div class=\"sp-r\">\n    <div class=\"prose\">In this program, the Champion role is hybrid. An existing team member allocates 10–20% of their time to security responsibilities while continuing their primary role.<\u002Fdiv>\n    <div class=\"prose\">This works when two conditions are met: explicit management support for the time allocation, and the team understands security work is part of the product's quality baseline — not \"extra.\"<\u002Fdiv>\n    <div class=\"prose\">The dedicated alternative — full-time Champion — is appropriate for large-scale products, regulated industries, or teams exceeding 30–40 people.<\u002Fdiv>\n    <div class=\"xp\" id=\"x11a\"><button class=\"xh\" onclick=\"tg('x11a')\"><span>How to negotiate time with your manager<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x11a-p\">Frame it in terms managers care about: risk reduction, faster incident response, fewer production issues. Instead of \"20% for security,\" say: \"I'd like to spend one day a week catching the kind of issues that become production incidents.\" Framing matters.<\u002Fdiv><\u002Fdiv>\n    <div class=\"xp\" id=\"x11b\"><button class=\"xh\" onclick=\"tg('x11b')\"><span>When does \"dedicated\" make more sense?<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x11b-p\">A full-time dedicated Champion becomes justified when: the product processes highly sensitive data (payments, healthcare, PII at scale), the team exceeds 30–40 people, the industry is heavily regulated (finance, government, defense), or the product has been a target of repeated attacks. In these cases, 10–20% is not enough — the security workload demands a full-time role.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">15 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(13)\">← Back<\u002Fbutton><button class=\"btn pri\" onclick=\"go(15)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S15: CRITICAL PERSON RISK -->\n<div class=\"slide\" id=\"s15\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Act 2<\u002Fspan> · The Champion<\u002Fspan><div class=\"pips\" id=\"pp15\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"split\"><div class=\"sp-l\"><div class=\"sp-t\">What happens when the Champion leaves<\u002Fdiv><\u002Fdiv><div class=\"sp-r\">\n    <div class=\"prose\">Every team faces the \"critical person\" risk: one person holds so much knowledge that their departure creates a gap. For Champions, this is acute — threat models, vulnerability history, risk assessments are often undocumented.<\u002Fdiv>\n    <div class=\"prose\">Best practice: at least <strong>two Champions per product for every ten or more developers.<\u002Fstrong> Two can review each other's work and ensure security knowledge is a team asset.<\u002Fdiv>\n    <div class=\"xp\" id=\"x12a\"><button class=\"xh\" onclick=\"tg('x12a')\"><span>Three mitigation strategies<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x12a-p\"><strong>Knowledge sharing<\u002Fstrong> — Document threat models, maintain a decision log, share in team channels. <strong>Rotation<\u002Fstrong> — A developer covers Champion tasks for a sprint. Builds understanding, tests real transfer. <strong>Mandatory vacations<\u002Fstrong> — Enforced leave: accounts locked, colleague takes over. Stress-tests whether knowledge was actually shared.<\u002Fdiv><\u002Fdiv>\n    <div class=\"xp\" id=\"x12b\"><button class=\"xh\" onclick=\"tg('x12b')\"><span>The Silicon Valley mandatory vacation practice<\u002Fspan><span class=\"xa\">›<\u002Fspan><\u002Fbutton><div class=\"xb\" id=\"x12b-p\">A company randomly selects employees for 1–2 weeks of enforced leave. Desktop access and accounts are locked. A colleague takes over everything. The purpose: stress-test knowledge sharing. If the colleague cannot function, the organization discovers its single point of failure before someone actually leaves.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">16 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(14)\">← Back<\u002Fbutton><button class=\"btn pri\" onclick=\"go(16)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S16: BREATHER — MUSICAL CHAIRS -->\n<div class=\"slide\" id=\"s16\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Time to think<\u002Fspan> · Redundancy matters<\u002Fspan><div class=\"pips\" id=\"pp16\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"breather bg-plum\">\n    <div class=\"breather-visual\"><div class=\"scene\" data-loop=\"8s\" style=\"--loop:8s\"><div class=\"scene-tools\"><button class=\"scene-btn\" data-act=\"pause\">⏸ Pause<\u002Fbutton><button class=\"scene-btn\" data-act=\"replay\">↻ Replay<\u002Fbutton><\u002Fdiv><div class=\"scene-stage\"><div class=\"chairs-box\">\n      <div class=\"chair-row\">\n        <div class=\"chair c1\"><div class=\"chair-seat\"><\u002Fdiv><div class=\"chair-person cp-or\"><svg class=\"ch-shield ch-shield-anim\" viewBox=\"0 0 14 16\"><path d=\"M7,1 L13,4 L13,10 L7,15 L1,10 L1,4 Z\" fill=\"var(--or)\"><\u002Fpath><path d=\"M4,8 L6,10 L10,6\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><svg viewBox=\"0 0 28 42\"><circle cx=\"14\" cy=\"9\" r=\"6\" fill=\"var(--or)\"><\u002Fcircle><rect x=\"6\" y=\"16\" width=\"16\" height=\"14\" rx=\"3\" fill=\"var(--or)\" opacity=\".7\"><\u002Frect><rect x=\"7\" y=\"29\" width=\"5\" height=\"10\" rx=\"2\" fill=\"var(--or)\" opacity=\".5\"><\u002Frect><rect x=\"16\" y=\"29\" width=\"5\" height=\"10\" rx=\"2\" fill=\"var(--or)\" opacity=\".5\"><\u002Frect><\u002Fsvg><div class=\"resigned-label\">resigned<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"chair c2\"><div class=\"chair-seat\"><\u002Fdiv><div class=\"chair-person cp-gray\"><svg class=\"ch-shield ch-shield-flicker\" viewBox=\"0 0 14 16\"><path d=\"M7,1 L13,4 L13,10 L7,15 L1,10 L1,4 Z\" fill=\"var(--or)\"><\u002Fpath><path d=\"M4,8 L6,10 L10,6\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><svg viewBox=\"0 0 28 42\"><circle cx=\"14\" cy=\"9\" r=\"6\" fill=\"var(--or)\" opacity=\".75\"><\u002Fcircle><rect x=\"6\" y=\"16\" width=\"16\" height=\"14\" rx=\"3\" fill=\"var(--or)\" opacity=\".55\"><\u002Frect><rect x=\"7\" y=\"29\" width=\"5\" height=\"10\" rx=\"2\" fill=\"var(--or)\" opacity=\".4\"><\u002Frect><rect x=\"16\" y=\"29\" width=\"5\" height=\"10\" rx=\"2\" fill=\"var(--or)\" opacity=\".4\"><\u002Frect><\u002Fsvg><div class=\"panic-mark\">!!<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"chair c3\"><div class=\"chair-seat\"><\u002Fdiv><div class=\"chair-person cp-gray2\"><svg class=\"ch-shield ch-shield-flicker\" viewBox=\"0 0 14 16\"><path d=\"M7,1 L13,4 L13,10 L7,15 L1,10 L1,4 Z\" fill=\"var(--or)\"><\u002Fpath><path d=\"M4,8 L6,10 L10,6\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><svg viewBox=\"0 0 28 42\"><circle cx=\"14\" cy=\"9\" r=\"6\" fill=\"var(--or)\" opacity=\".75\"><\u002Fcircle><rect x=\"6\" y=\"16\" width=\"16\" height=\"14\" rx=\"3\" fill=\"var(--or)\" opacity=\".55\"><\u002Frect><rect x=\"7\" y=\"29\" width=\"5\" height=\"10\" rx=\"2\" fill=\"var(--or)\" opacity=\".4\"><\u002Frect><rect x=\"16\" y=\"29\" width=\"5\" height=\"10\" rx=\"2\" fill=\"var(--or)\" opacity=\".4\"><\u002Frect><\u002Fsvg><div class=\"panic-mark\">!!<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"new-champ\"><svg class=\"new-champ-shield\" width=\"14\" height=\"16\" viewBox=\"0 0 14 16\"><path d=\"M7,1 L13,4 L13,10 L7,15 L1,10 L1,4 Z\" fill=\"var(--gr)\"><\u002Fpath><path d=\"M4,8 L6,10 L10,6\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><svg viewBox=\"0 0 28 42\"><circle cx=\"14\" cy=\"9\" r=\"6\" fill=\"var(--gr)\"><\u002Fcircle><rect x=\"6\" y=\"16\" width=\"16\" height=\"14\" rx=\"3\" fill=\"var(--gr)\" opacity=\".7\"><\u002Frect><rect x=\"7\" y=\"29\" width=\"5\" height=\"10\" rx=\"2\" fill=\"var(--gr)\" opacity=\".5\"><\u002Frect><rect x=\"16\" y=\"29\" width=\"5\" height=\"10\" rx=\"2\" fill=\"var(--gr)\" opacity=\".5\"><\u002Frect><\u002Fsvg><\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv><div class=\"scene-loop\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"breather-caption\"><p>One champion leaves — the others wobble, shields flicker.<br><strong>Two or more champions<\u002Fstrong> per team turns a crisis into a handover.<\u002Fp>\n    <div class=\"breather-notice\">Did you notice — <b>the new champion arrives carrying a green shield<\u002Fb>? Knowledge is handed over, not lost.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">Time to think and reflect<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(15)\">← Back<\u002Fbutton><button class=\"btn reflect-btn\" onclick=\"openReflect('redundancy')\">⏸ Reflect<\u002Fbutton><button class=\"btn pri\" onclick=\"go(17)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- S17: KNOWLEDGE CHECK 2 -->\n<div class=\"slide\" id=\"s17\">\n  <div class=\"sh\"><span class=\"stag\">Knowledge check<\u002Fspan><div class=\"pips\" id=\"pp17\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"split\"><div class=\"sp-l\"><div class=\"sp-t\">Knowledge check<\u002Fdiv><\u002Fdiv><div class=\"sp-r\">\n    <div class=\"qw\" id=\"q3\"><div class=\"qq\">What is the primary advantage of a Champion over an external specialist?<\u002Fdiv><button class=\"qo\" onclick=\"pk('q3',0)\">A) Deeper security expertise<\u002Fbutton><button class=\"qo\" onclick=\"pk('q3',1)\">B) Already understands the product — can act faster<\u002Fbutton><button class=\"qo\" onclick=\"pk('q3',2)\">C) Less expensive to hire<\u002Fbutton><button class=\"qo\" onclick=\"pk('q3',3)\">D) Replaces the central security team<\u002Fbutton><div class=\"qe\" id=\"q3-e\"><strong>B.<\u002Fstrong> Context is the advantage. They know the product, team, and stack — no months-long onboarding. Champions complement the security team by reducing response latency and building distributed awareness.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"sf\"><span class=\"shint\">18 / 32<\u002Fspan><div class=\"snav\"><button class=\"btn\" onclick=\"go(16)\">← Back<\u002Fbutton><button class=\"btn pri\" onclick=\"go(18)\">Next →<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n\n<!-- S18: SECTION — PLAYBOOK -->\n<div class=\"slide\" id=\"s18\">\n  <div class=\"sh\"><span class=\"stag\"><span class=\"hl\">Part 3<\u002Fspan><\u002Fspan><div class=\"pips\" id=\"pp18\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"sb\"><div class=\"fbody\">\n    <div class=\"fb-content\">\n      <div class=\"fb-tg\">Part 3<\u002Fdiv>\n      <div class=\"fb-tt\">The Playbook<\u002Fdiv>\n      <div class=\"fb-sb\">How to launch and sustain a Security Champions program — from team identification to long-term engagement.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"fb-visual\"><svg viewBox=\"0 0 140 100\" width=\"240\" height=\"170\"><path class=\"step-line\" d=\"M15,50 L35,25 L55,50 L75,25 L95,50 L115,25 L135,50\" fill=\"none\" stroke=\"var(--or)\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><circle class=\"step-dot\" cx=\"15\" cy=\"50\" r=\"0\" fill=\"var(--or)\"><\u002Fcircle><circle class=\"step-dot\" cx=\"35\" cy=\"25\" r=\"0\" fill=\"var(--or)\"><\u002Fcircle><circle class=\"step-dot\" cx=\"55\" cy=\"50\" r=\"0\" fill=\"var(--or)\"><\u002Fcircle><circle class=\"step-dot\" cx=\"75\" cy=\"25\" r=\"0\" fill=\"var(--or)\"><\u002Fcircle><circle class=\"step-dot\" cx=\"95\" cy=\"50\" r=\"0\" fill=\"var(--or)\"><\u002Fcircle><circle class=\"step-dot\" cx=\"115\" cy=\"25\" r=\"0\" fill=\"var(--or)\"><\u002Fcircle><circle class=\"step-dot\" cx=\"135\" cy=\"50\" r=\"0\" fill=\"var(--or)\"><\u002Fcircle><text x=\"15\" y=\"65\" fill=\"rgba(255,255,255,.3)\" font-size=\"6\" text-anchor=\"middle\" font-family=\"DM Sans\">1<\u002Ftext><text x=\"35\" y=\"18\" fill=\"rgba(255,255,255,.3)\" font-size=\"6\" text-anchor=\"middle\" font-family=\"DM Sans\">2<\u002Ftext><text x=\"55\" y=\"65\" fill=\"rgba(255,255,255,.3)\" font-size=\"6\" text-anchor=\"middle\" font-family=\"DM Sans\">3<\u002Ftext><text x=\"75\" y=\"18\" fill=\"rgba(255,255,255,.3)\" font-size=\"6\" text-anchor=\"middle\" font-family=\"DM Sans\">4<\u002Ftext><text x=\"95\" y=\"65\" fill=\"rgba(255,255,255,.3)\" font-size=\"6\" text-anchor=\"middle\" fon
