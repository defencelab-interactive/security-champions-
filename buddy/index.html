<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Champ · Security Champions Learning Buddy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bk: #0d0f13;
  --card: #1a1d26;
  --bd: #262a35;
  --or: #E8813A;
  --od: #C76B2A;
  --ol: rgba(232,129,58,.1);
  --gr: #2EAD6B;
  --wh: #f0ece6;
  --tm: #b8b2a8;
  --mu: #6b6560;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bk);color:var(--wh);-webkit-font-smoothing:antialiased}

canvas#bg{position:fixed;inset:0;z-index:0}

/* ═══ LAYOUT ═══ */
.layout{
  position:relative;z-index:1;
  display:flex;height:100vh;
}

/* ═══ LEFT: CHAT ═══ */
.chat-side{
  width:50%;min-width:360px;
  display:flex;flex-direction:column;
  background:rgba(13,15,19,.85);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-right:1px solid var(--bd);
}
.hdr{
  padding:14px 20px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--bd);flex-shrink:0;
}
.hdr-icon{
  width:36px;height:36px;
  background:linear-gradient(135deg,var(--or),var(--od));
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(232,129,58,.3);
}
.hdr-icon svg{width:18px;height:18px}
.hdr-text{flex:1}
.hdr-title{font-size:14px;font-weight:700}
.hdr-title span{color:var(--or)}
.hdr-sub{font-size:10px;color:var(--mu);margin-top:1px}

.msgs{
  flex:1;overflow-y:auto;padding:14px 16px;
  display:flex;flex-direction:column;gap:10px;
  scrollbar-width:thin;scrollbar-color:var(--bd) transparent;
}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}

.msg{display:flex;gap:8px;animation:fi .25s ease-out}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.msg.user{flex-direction:row-reverse}
.bub{max-width:88%;padding:10px 14px;font-size:14px;line-height:1.6;border-radius:14px}
.msg.bot .bub{background:var(--card);border:1px solid var(--bd);border-top-left-radius:4px}
.msg.user .bub{background:linear-gradient(135deg,rgba(232,129,58,.12),rgba(232,129,58,.05));border:1px solid rgba(232,129,58,.18);border-top-right-radius:4px}
.bub p{margin-bottom:6px}.bub p:last-child{margin-bottom:0}
.bub strong{color:var(--or);font-weight:700}
.bub em{color:var(--or);font-style:normal}
.bub code{background:rgba(255,255,255,.06);padding:1px 5px;border-radius:4px;font-size:12px;font-family:'Space Mono',monospace}
.bub pre{background:rgba(0,0,0,.4);padding:10px;border-radius:8px;overflow-x:auto;margin:6px 0;font-size:12px;line-height:1.5}
.bub ul,.bub ol{padding-left:18px;margin:4px 0}.bub li{margin-bottom:3px}

.dots{display:flex;gap:5px;padding:6px 2px}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--or);opacity:.3;animation:dt 1.4s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes dt{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}

.sugs{padding:4px 16px 6px;display:flex;flex-wrap:wrap;gap:5px;flex-shrink:0}
.sug{background:rgba(255,255,255,.03);border:1px solid var(--bd);color:var(--tm);padding:6px 12px;border-radius:20px;font-family:inherit;font-size:11px;cursor:pointer;transition:all .2s}
.sug:hover{background:var(--ol);border-color:var(--or);color:var(--or);transform:translateY(-1px)}

.inp-area{padding:10px 16px 14px;border-top:1px solid var(--bd);display:flex;gap:8px;flex-shrink:0}
.inp{flex:1;background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:10px 14px;color:var(--wh);font-family:inherit;font-size:14px;outline:none;resize:none;min-height:42px;max-height:100px;line-height:1.5;transition:border-color .15s,box-shadow .15s}
.inp::placeholder{color:var(--mu)}
.inp:focus{border-color:var(--or);box-shadow:0 0 16px rgba(232,129,58,.08)}
.send{width:42px;height:42px;background:linear-gradient(135deg,var(--or),var(--od));border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;box-shadow:0 4px 14px rgba(232,129,58,.25)}
.send:hover{transform:scale(1.06);box-shadow:0 6px 20px rgba(232,129,58,.35)}
.send:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
.send svg{width:18px;height:18px;fill:#fff}

/* ═══ RIGHT: MASCOT STAGE ═══ */
.mascot-side{
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  position:relative;
  padding:40px;
}

/* Mascot character */
.guy-stage{
  display:flex;flex-direction:column;align-items:center;
  transition:transform 1.5s cubic-bezier(.25,.46,.45,.94);
}

/* ═══ IDLE MOVEMENT STAGES ═══ */
.guy-stage.wander{transform:translateX(75%) translateY(25%)}
.guy-stage.wander .guy{animation:wander-look 3s ease-in-out infinite}
@keyframes wander-look{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-6px) rotate(5deg)}}
.guy-stage.wander .eye-pupil{transform:translate(4px,0)}

.guy-stage.peek{transform:translateX(-140%) translateY(55%);z-index:20}
.guy-stage.peek .guy{animation:peek-nudge 2s ease-in-out infinite}
@keyframes peek-nudge{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-8px) rotate(3deg)}}
.guy-stage.peek .eye-pupil{animation:peek-look 2s ease-in-out infinite}
@keyframes peek-look{0%,100%{transform:translate(-4px,2px)}35%{transform:translate(-4px,2px)}50%{transform:translate(3px,-2px)}85%{transform:translate(3px,-2px)}}
.guy-stage.peek .eye-lid{animation:peek-blink 3s ease-in-out infinite!important}
@keyframes peek-blink{0%,42%,48%,100%{transform:scaleY(0)}44%,46%{transform:scaleY(1)}}
.guy-stage.peek .mouth-normal{opacity:0}
.guy-stage.peek .mouth-happy{opacity:1}
.guy-stage.peek .question-marks{opacity:1}
.guy-stage.peek .guy-status{display:none}
.guy-stage.peek .guy-shadow{display:none}
.guy-stage.peek .peek-label{opacity:1}

.peek-label{
  position:absolute;top:-40px;left:50%;transform:translateX(-50%);
  white-space:nowrap;
  font-size:15px;font-weight:600;font-style:italic;
  color:var(--or);
  text-shadow:0 0 20px rgba(232,129,58,.3);
  opacity:0;transition:opacity .4s;
  pointer-events:none;
  animation:peek-label-pulse 2s ease-in-out infinite;
}
@keyframes peek-label-pulse{0%,100%{opacity:.7;transform:translateX(-50%) translateY(0)}50%{opacity:1;transform:translateX(-50%) translateY(-4px)}}

/* Peek floating label above head */
.peek-label{
  display:none;
  text-align:center;
  font-size:16px;font-weight:600;font-style:italic;
  color:var(--or);
  text-shadow:0 0 20px rgba(232,129,58,.3);
  animation:peek-pulse 2s ease-in-out infinite;
  margin-bottom:8px;
}
.guy-stage.peek .peek-label{display:block}
@keyframes peek-pulse{0%,100%{opacity:.7}50%{opacity:1}}

/* Floating question marks */
.question-marks{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:280px;height:120px;pointer-events:none;opacity:0;transition:opacity .4s;
}
.qm{
  position:absolute;font-size:20px;font-weight:700;color:var(--or);
  opacity:0;animation:qm-float 3s ease-in-out infinite;
}
.qm:nth-child(1){left:10%;top:20%;animation-delay:0s}
.qm:nth-child(2){right:5%;top:10%;animation-delay:.8s;font-size:16px}
.qm:nth-child(3){left:0%;top:0%;animation-delay:1.6s;font-size:24px}
@keyframes qm-float{
  0%{opacity:0;transform:translateY(10px) rotate(-10deg)}
  20%{opacity:.8;transform:translateY(0) rotate(0deg)}
  80%{opacity:.8;transform:translateY(-8px) rotate(5deg)}
  100%{opacity:0;transform:translateY(-20px) rotate(10deg)}
}

.guy{
  position:relative;
  width:280px;height:340px;
  animation:float 4s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.guy svg{width:100%;height:100%}

/* Orbiting security icons */
.orbit{position:absolute;inset:-40px;animation:spin 25s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.orb-item{
  position:absolute;
  width:32px;height:32px;
  background:rgba(232,129,58,.08);
  border:1px solid rgba(232,129,58,.15);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;
  animation:counter-spin 25s linear infinite;
}
@keyframes counter-spin{to{transform:rotate(-360deg)}}
.orb-item:nth-child(1){top:0;left:50%;margin-left:-16px}
.orb-item:nth-child(2){top:50%;right:0;margin-top:-16px}
.orb-item:nth-child(3){bottom:0;left:50%;margin-left:-16px}
.orb-item:nth-child(4){top:50%;left:0;margin-top:-16px}

/* Shadow under guy */
.guy-shadow{
  width:120px;height:14px;
  background:radial-gradient(ellipse,rgba(232,129,58,.15) 0%,transparent 70%);
  border-radius:50%;
  margin-top:-10px;
  animation:shadow-breathe 4s ease-in-out infinite;
}
@keyframes shadow-breathe{0%,100%{transform:scaleX(1);opacity:1}50%{transform:scaleX(.85);opacity:.6}}

/* Status text under mascot */
.guy-status{
  margin-top:24px;
  text-align:center;
}
.guy-status .gs-label{
  font-family:'Space Mono',monospace;
  font-size:11px;letter-spacing:2px;
  color:var(--mu);text-transform:uppercase;
  transition:all .3s;
}
.guy-status .gs-mood{
  font-size:22px;margin-top:4px;
  transition:all .3s;
}

/* Mascot states */
.guy.idle .gs-label{color:var(--mu)}
.guy.idle .gs-mood::after{content:'Ready to help'}
.guy.thinking .gs-label{color:var(--or)}
.guy.thinking .gs-mood::after{content:'Thinking...'}
.guy.happy .gs-label{color:var(--gr)}
.guy.happy .gs-mood::after{content:'Here you go!'}
.guy.typing-user .gs-label{color:var(--or)}
.guy.typing-user .gs-mood::after{content:'Listening...'}
.guy.bored .gs-label{color:var(--mu)}
.guy.bored .gs-mood::after{content:'Still here...'}
.guy.sad .gs-label{color:#D94545}
.guy.sad .gs-mood::after{content:'Oops...'}
.guy.curious .gs-label{color:var(--or)}
.guy.curious .gs-mood::after{content:'Hmm, let\27s see...'}
.guy.nod .gs-label{color:var(--gr)}
.guy.nod .gs-mood::after{content:'There you go!'}
.guy.proud .gs-label{color:var(--gr)}
.guy.proud .gs-mood::after{content:'Great job!'}

/* ═══ TYPING-USER: lean forward, eyes toward chat ═══ */
.guy.typing-user{animation:float-lean 2s ease-in-out infinite}
@keyframes float-lean{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-6px) rotate(-3deg)}}
.guy.typing-user .eye-pupil{transform:translate(-3px,0)}
.guy.typing-user .antenna-dot{animation:fast-blink .4s ease-in-out infinite!important}
@keyframes fast-blink{0%,100%{opacity:.3}50%{opacity:1}}

/* ═══ BORED: yawn + foot tap ═══ */
.guy.bored{animation:float-bored 5s ease-in-out infinite}
@keyframes float-bored{0%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}60%{transform:translateY(-2px)}}
.guy.bored .eye-lid{animation:sleepy-blink 3s ease-in-out infinite!important}
@keyframes sleepy-blink{0%,30%,100%{transform:scaleY(0)}35%,90%{transform:scaleY(.7)}}
.guy.bored .eye-pupil{transform:translate(0,2px)}
.guy.bored .mouth-normal{opacity:0}
.guy.bored .mouth-yawn{opacity:1}
.guy.bored .zzz{opacity:1}
.guy.bored .foot-l{animation:tap-foot 1s ease-in-out infinite}
@keyframes tap-foot{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

/* ═══ SAD: eyes down, slump ═══ */
.guy.sad{animation:none;transform:translateY(4px)}
.guy.sad .eye-pupil{transform:translate(0,3px)}
.guy.sad .eye-lid{animation:none!important;transform:scaleY(.4)}
.guy.sad .mouth-normal{opacity:0}
.guy.sad .mouth-sad{opacity:1}
.guy.sad .sweat-drop{opacity:1}

/* ═══ CURIOUS: squint + head tilt ═══ */
.guy.curious .guy-body{animation:tilt .4s ease forwards}
@keyframes tilt{to{transform:rotate(4deg)}}
.guy.curious .eye-lid{animation:none!important;transform:scaleY(.35)}
.guy.curious .eye-pupil{transform:translate(0,-1px)}

/* ═══ NOD: nodding ═══ */
.guy.nod .guy-body{animation:nod-move .8s ease}
@keyframes nod-move{0%{transform:translateY(0)}20%{transform:translateY(4px)}40%{transform:translateY(0)}55%{transform:translateY(3px)}70%{transform:translateY(0)}85%{transform:translateY(2px)}100%{transform:translateY(0)}}

/* ═══ PROUD: jump + sparkles ═══ */
.guy.proud .guy-body{animation:proud-jump .6s ease}
@keyframes proud-jump{0%{transform:translateY(0)}25%{transform:translateY(-14px)}50%{transform:translateY(0)}70%{transform:translateY(-6px)}100%{transform:translateY(0)}}
.guy.proud .happy-eye{opacity:1}
.guy.proud .eye-pupil{opacity:0}
.guy.proud .eye-lid{animation:none;transform:scaleY(1)}
.guy.proud .mouth-normal{opacity:0}
.guy.proud .mouth-happy{opacity:1}
.guy.proud .head-sparkles{animation:sparkle-burst .8s ease-out forwards}
.guy.proud .hsp{animation:hsp-fly .7s ease-out forwards}

/* ═══ MYSTIC: fortune-telling mode ═══ */
.guy.mystic{animation:mystic-hover 3s ease-in-out infinite}
@keyframes mystic-hover{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-12px) scale(1.03)}}
.guy.mystic .eye-lid{animation:none!important;transform:scaleY(.5)}
.guy.mystic .eye-pupil{animation:mystic-gaze 3s ease-in-out infinite}
@keyframes mystic-gaze{0%,100%{transform:translate(0,0)}33%{transform:translate(2px,-2px)}66%{transform:translate(-2px,1px)}}
.guy.mystic .antenna-dot{animation:mystic-pulse 1.5s ease-in-out infinite!important;fill:#a855f7}
@keyframes mystic-pulse{0%,100%{opacity:.3;r:4}50%{opacity:1;r:8}}
.guy.mystic .mouth-normal{opacity:0}
.guy.mystic .mouth-mystic{opacity:1}
.guy.mystic .orbit{animation:spin 8s linear infinite}
.guy.mystic .orb-item{border-color:rgba(168,85,247,.3);background:rgba(168,85,247,.08)}

/* ═══ Extra SVG elements ═══ */
.mouth-yawn,.mouth-sad,.mouth-mystic,.sweat-drop,.zzz{opacity:0;transition:opacity .3s}
.zzz{position:absolute;top:8%;right:12%;font-size:18px;animation:zzz-float 2s ease-in-out infinite;pointer-events:none}
@keyframes zzz-float{0%,100%{transform:translateY(0) rotate(-5deg);opacity:0}20%{opacity:1}80%{opacity:1}100%{transform:translateY(-16px) rotate(5deg);opacity:0}}

/* ═══ CLICK ZONES ═══ */
.click-zone{cursor:pointer;opacity:0;fill:transparent;transition:opacity .1s}
.click-zone:hover{opacity:.08;fill:var(--or)}
.shield-glow{opacity:0;transition:opacity .4s}
.shield-glow.on{opacity:1;animation:shield-pulse .8s ease-out}
@keyframes shield-pulse{0%{opacity:0}30%{opacity:1}100%{opacity:0}}

/* Click feedback glow */
.guy.clicked{filter:drop-shadow(0 0 12px rgba(232,129,58,.5))}
.guy.clicked .antenna-dot{animation:click-flare .4s ease!important}
@keyframes click-flare{0%{r:4;opacity:.6}50%{r:12;opacity:1}100%{r:4;opacity:.6}}

/* Eye tracking */
.eye-pupil{transition:transform .15s ease}
.guy.thinking .eye-pupil{animation:look 1.8s ease-in-out infinite}
@keyframes look{0%,100%{transform:translate(0,0)}25%{transform:translate(3px,-2px)}50%{transform:translate(-3px,1px)}75%{transform:translate(2px,2px)}}

/* Blink */
.eye-lid{animation:blink 4s ease-in-out infinite}
@keyframes blink{0%,44%,48%,100%{transform:scaleY(0)}45%,47%{transform:scaleY(1)}}

/* Happy bounce — gentle jump only */
.guy.happy .guy-body{animation:bounce .5s ease}
@keyframes bounce{0%{transform:translateY(0)}30%{transform:translateY(-8px)}60%{transform:translateY(2px)}100%{transform:translateY(0)}}

/* Happy eyes — squint into ^^ crescents */
.guy.happy .eye-lid{animation:none;transform:scaleY(1)}
.guy.happy .eye-pupil{opacity:0}
.guy.happy .happy-eye{opacity:1}

/* Antenna flare on happy */
.guy.happy .antenna-dot{animation:flare .6s ease;fill:var(--or)}
@keyframes flare{0%{r:4;opacity:.6}40%{r:10;opacity:1}100%{r:4;opacity:.6}}

/* Happy mouth — big smile */
.guy.happy .mouth-normal{opacity:0}
.guy.happy .mouth-happy{opacity:1}

/* Sparkles around head on happy */
.head-sparkles{position:absolute;top:10%;left:50%;transform:translateX(-50%);width:200px;height:100px;pointer-events:none;opacity:0}
.guy.happy .head-sparkles{animation:sparkle-burst .8s ease-out forwards}
@keyframes sparkle-burst{0%{opacity:1}100%{opacity:0}}
.hsp{position:absolute;width:6px;height:6px;background:var(--or);border-radius:50%;opacity:0}
.guy.happy .hsp{animation:hsp-fly .7s ease-out forwards}
.hsp:nth-child(1){left:30%;top:50%;--hx:-24px;--hy:-30px;animation-delay:0s}
.hsp:nth-child(2){left:70%;top:50%;--hx:24px;--hy:-28px;animation-delay:.05s}
.hsp:nth-child(3){left:50%;top:30%;--hx:0;--hy:-35px;animation-delay:.1s}
.hsp:nth-child(4){left:20%;top:60%;--hx:-30px;--hy:-10px;animation-delay:.08s}
.hsp:nth-child(5){left:80%;top:60%;--hx:30px;--hy:-10px;animation-delay:.12s}
.hsp:nth-child(6){left:40%;top:40%;--hx:-15px;--hy:-32px;animation-delay:.06s}
@keyframes hsp-fly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--hx),var(--hy)) scale(0)}}

/* Speech — reuses fortune zone */

/* ═══ CYBER FORTUNE ═══ */
.fortune-zone{
  position:absolute;top:8%;left:50%;transform:translateX(-50%);
  width:420px;text-align:center;pointer-events:none;
  min-height:100px;display:flex;align-items:center;justify-content:center;
  padding:0 10px;
}
.fortune-text{
  font-size:20px;line-height:1.6;
  color:#a855f7;font-weight:600;
  font-style:italic;
  opacity:0;
  text-shadow:0 0 30px rgba(168,85,247,.4),0 0 60px rgba(168,85,247,.15);
  animation:none;
}
.fortune-text.show{animation:fortune-rise 6s ease-out forwards}
@keyframes fortune-rise{
  0%{opacity:0;transform:translateY(24px) scale(.85);filter:blur(6px)}
  10%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
  70%{opacity:1;transform:translateY(-3px)}
  85%{opacity:.6;transform:translateY(-10px);filter:blur(1px)}
  100%{opacity:0;transform:translateY(-30px) scale(.95);filter:blur(8px)}
}

.fortune-cta{
  margin-top:8px;
  cursor:pointer;
  background:none;border:1px solid rgba(168,85,247,.25);
  color:#a855f7;
  font-family:'DM Sans',sans-serif;
  font-size:12px;font-weight:600;
  padding:8px 20px;border-radius:20px;
  letter-spacing:.5px;
  transition:all .25s;
  position:relative;overflow:hidden;
}
.fortune-cta:hover{
  background:rgba(168,85,247,.08);border-color:#a855f7;
  transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(168,85,247,.15);
}
.fortune-cta:active{transform:scale(.97)}
.fortune-cta .cta-icon{
  display:inline-block;margin-right:6px;
  animation:cta-wiggle 2s ease-in-out infinite;
}
@keyframes cta-wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}

/* ═══ MOBILE ═══ */
@media(max-width:800px){
  .mascot-side{display:none}
  .chat-side{width:100%;min-width:0;border-right:none}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="layout">
  <!-- LEFT: CHAT -->
  <div class="chat-side">
    <div class="hdr">
      <div class="hdr-icon">
        <svg viewBox="0 0 18 20" fill="none"><path d="M9,1 L16,4 L16,12 L9,18 L2,12 L2,4 Z" fill="#fff"/><path d="M6,10 L8,12 L12,7" stroke="#E8813A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="hdr-text">
        <div class="hdr-title"><span>Champ</span> — your Learning Buddy</div>
      </div>
    </div>

    <div class="sugs" id="sugs">

<script>
let busy=false;
/* ═══ BACKGROUND ═══ */
const cvs=document.getElementById('bg'),cx=cvs.getContext('2d');
let W,H,nodes=[];
function resize(){W=cvs.width=innerWidth;H=cvs.height=innerHeight}
resize();addEventListener('resize',resize);

class N{
  constructor(){this.x=Math.random()*W;this.y=Math.random()*H;this.vx=(Math.random()-.5)*.25;this.vy=(Math.random()-.5)*.25;this.r=Math.random()*1.5+.5}
  update(){this.x+=this.vx;this.y+=this.vy;if(this.x<-10)this.x=W+10;if(this.x>W+10)this.x=-10;if(this.y<-10)this.y=H+10;if(this.y>H+10)this.y=-10}
  draw(){cx.beginPath();cx.arc(this.x,this.y,this.r,0,Math.PI*2);cx.fillStyle='rgba(232,129,58,.2)';cx.fill()}
}
for(let i=0;i<45;i++)nodes.push(new N);
function bgLoop(){
  cx.clearRect(0,0,W,H);
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<160){cx.beginPath();cx.moveTo(nodes[i].x,nodes[i].y);cx.lineTo(nodes[j].x,nodes[j].y);cx.strokeStyle=`rgba(232,129,58,${.04*(1-d/160)})`;cx.lineWidth=.5;cx.stroke()}
    }
  }
  nodes.forEach(n=>{n.update();n.draw()});
  requestAnimationFrame(bgLoop);
}
bgLoop();

/* ═══ MASCOT STATE ═══ */
const guy=document.getElementById('guy');
const fortuneText=document.getElementById('fortuneText');
const gsLabel=document.getElementById('gsLabel');
const gsMood=document.getElementById('gsMood');
let mt=null, idleTimer=null, typingTimer=null;

const moods={
  idle:{label:'STATUS',mood:'Ready to help ✦'},
  thinking:{label:'PROCESSING',mood:'Thinking…'},
  happy:{label:'DONE',mood:'Here you go! ✓'},
  'typing-user':{label:'LISTENING',mood:'Go on, I\'m listening…'},
  bored:{label:'IDLE',mood:'Still here… 💤'},
  sad:{label:'ERROR',mood:'Something broke…'},
  curious:{label:'QUIZ TIME',mood:'Think carefully… 🤔'},
  nod:{label:'EXPLAINED',mood:'Got it? ✓'},
  proud:{label:'AWESOME',mood:'Nailed it! 🎉'},
  mystic:{label:'🔮 ORACLE',mood:'The bits whisper…'},
  wander:{label:'SEARCHING',mood:'Where did everyone go?'},
  peek:{label:'👀 HEY',mood:'Let me pick something for you!'}
};

const guyStage=document.getElementById('guyStage');
let idleStage=0;
let peekActionTimer=null;
const IDLE_STAGES=[
  {delay:20000, state:'bored', move:''},
  {delay:25000, state:'wander', move:'wander'},
  {delay:15000, state:'peek', move:'peek', action:'suggest'}
];

function setGuy(state,dur){
  guy.className='guy '+state;
  const m=moods[state]||moods.idle;
  gsLabel.textContent=m.label;
  gsMood.textContent=m.mood;
  if(mt)clearTimeout(mt);
  if(dur)mt=setTimeout(()=>{setGuy('idle');startIdleTimer()},dur);
  if(state!=='bored'&&state!=='wander'&&state!=='peek')resetIdleTimer();
}

function startIdleTimer(){
  if(idleTimer)clearTimeout(idleTimer);
  if(idleStage>=IDLE_STAGES.length){idleStage=0;return}
  var stage=IDLE_STAGES[idleStage];
  idleTimer=setTimeout(function(){
    if(!busy){
      setGuy(stage.state);
      guyStage.className='guy-stage'+(stage.move?' '+stage.move:'');
      if(stage.action==='suggest'){
        peekActionTimer=setTimeout(function(){
          if(!busy&&guyStage.classList.contains('peek')){
            var btns=Array.from(document.querySelectorAll('.sug'));
            if(!btns.length)return;
            var step=0;
            var cycleTimer=null;
            function typeText(text,cb){
              inp.value='';var i=0;
              var iv=setInterval(function(){
                if(i<text.length){inp.value+=text[i];i++}
                else{clearInterval(iv);if(cb)cb()}
              },35);
            }
            function nextStep(){
              if(busy||!guyStage.classList.contains('peek')){return}
              // Cycle through suggestions
              var idx=step%btns.length;
              btns.forEach(function(b){b.style=''});
              btns[idx].style.background='var(--ol)';btns[idx].style.borderColor='var(--or)';btns[idx].style.color='var(--or)';btns[idx].style.transform='scale(1.08)';
              typeText(btns[idx].textContent,function(){
                step++;
                // After full cycle, type the question
                if(step%btns.length===0){
                  cycleTimer=setTimeout(function(){
                    if(busy||!guyStage.classList.contains('peek'))return;
                    btns.forEach(function(b){b.style=''});
                    typeText('So... what shall we talk about? 🤔',function(){
                      inp.style.borderColor='var(--or)';
                      inp.style.boxShadow='0 0 16px rgba(232,129,58,.2)';
                      // Restart cycle after pause
                      cycleTimer=setTimeout(function(){
                        inp.style='';
                        nextStep();
                      },3000);
                    });
                  },2500);
                } else {
                  cycleTimer=setTimeout(nextStep,2500);
                }
              });
            }
            // Store cleanup ref
            var origReset=resetIdleTimer;
            resetIdleTimer=function(){
              if(cycleTimer)clearTimeout(cycleTimer);
              btns.forEach(function(b){b.style=''});
              inp.style='';inp.value='';
              resetIdleTimer=origReset;
              origReset();
            };
            nextStep();
          }
        },3000);
      }
      idleStage++;
      startIdleTimer();
    }
  },stage.delay);
}
function resetIdleTimer(){
  if(idleTimer)clearTimeout(idleTimer);
  if(peekActionTimer){clearTimeout(peekActionTimer);peekActionTimer=null}
  idleStage=0;
  guyStage.className='guy-stage';
  fortuneText.className='fortune-text';fortuneText.textContent='';
  if(!busy)startIdleTimer();
}

function onUserType(){
  if(busy)return;
  setGuy('typing-user');
  if(typingTimer)clearTimeout(typingTimer);
  typingTimer=setTimeout(()=>{if(!busy)setGuy('idle')},2000);
}

function detectReaction(text){
  const l=text.toLowerCase();
  if(l.includes('which stride')||l.includes('what stride')||l.includes('quiz')||
     l.includes('question:')||l.match(/which\s+(owasp|letter|threat|category)/)||l.includes('what do you think')){
    return 'curious';
  }
  if(l.includes('correct!')||l.includes('right!')||l.includes('nailed')||
     l.includes('exactly!')||l.includes('well done')||l.includes('great job')||l.includes('perfect!')){
    return 'proud';
  }
  if(text.length>300&&!text.trim().endsWith('?')){
    return 'nod';
  }
  return 'happy';
}

setGuy('idle');
startIdleTimer();

/* ═══ CHAT ═══ */
const API='https://billowing-band-4751.vmorgun2912.workers.dev/';
const chatEl=document.getElementById('chat');
const inp=document.getElementById('inp');
const sendBtn=document.getElementById('sendBtn');
const sugsEl=document.getElementById('sugs');
let history=[];

inp.addEventListener('input',()=>{
  inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,100)+'px';
  onUserType();
});
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});

function addMsg(role,text){
  var cleanText=text;
  var newSugs=[];
  if(role==='bot'){
    // Parse [SUG: text] tags
    cleanText=text.replace(/\[SUG:\s*([^\]]+)\]/g,function(m,s){
      newSugs.push(s.trim());
      return '';
    }).trim();
    // Update suggestion buttons if we got new ones
    if(newSugs.length>0){
      sugsEl.innerHTML='';
      newSugs.forEach(function(s){
        var btn=document.createElement('button');
        btn.className='sug';
        btn.textContent=s;
        btn.onclick=function(){askSug(btn)};
        sugsEl.appendChild(btn);
      });
      sugsEl.style.display='';
    }
  }
  const d=document.createElement('div');d.className='msg '+role;
  d.innerHTML='<div class="bub">'+fmt(cleanText)+'</div>';
  chatEl.appendChild(d);chatEl.scrollTop=chatEl.scrollHeight;
}
function addTyping(){
  const d=document.createElement('div');d.className='msg bot';d.id='typing';
  d.innerHTML='<div class="bub"><div class="dots"><span></span><span></span><span></span></div></div>';
  chatEl.appendChild(d);chatEl.scrollTop=chatEl.scrollHeight;
}
function rmTyping(){const t=document.getElementById('typing');if(t)t.remove()}

function fmt(t){
  // Escape HTML entities first to prevent XSS
  t=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  // Then apply markdown formatting on safe text
  return t.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*\[(.+?)\]\((.+?)\)\*\*/g,'<a href="$2" target="_blank" style="color:var(--or);font-weight:700;text-decoration:underline">$1</a>')
    .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank" style="color:var(--or);text-decoration:underline">$1</a>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^- (.+)/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>')
    .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>')
    .replace(/^/,'<p>').replace(/$/,'</p>');
}

function askSug(btn){inp.value=btn.textContent;send()}

const MAX_HISTORY=40; // 20 pairs
async function send(){
  const text=inp.value.trim();
  if(!text||busy)return;
  busy=true;sendBtn.disabled=true;sugsEl.style.display='none';
  addMsg('user',text);
  history.push({role:'user',content:text});
  if(history.length>MAX_HISTORY)history=history.slice(-MAX_HISTORY);
  inp.value='';inp.style.height='auto';
  setGuy('thinking');addTyping();

  try{
    const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:history})});
    const data=await res.json();rmTyping();
    if(data.content&&data.content.length){
      const reply=data.content.map(function(c){return c.text||''}).join('\n');
      const reaction=detectReaction(reply);
      setGuy(reaction,3000);
      addMsg('bot',reply);
      history.push({role:'assistant',content:reply});
      if(history.length>MAX_HISTORY)history=history.slice(-MAX_HISTORY);
    }else{
      setGuy('sad',3000);
      addMsg('bot','⚠ '+(data.error&&data.error.message?data.error.message:'Something went wrong.'));
    }
  }catch(err){
    rmTyping();
    setGuy('sad',3000);
    addMsg('bot','⚠ '+err.message);
  }
  busy=false;sendBtn.disabled=false;
}

};
